body:
  text: 海陵程兆鸞録存蓮寶訓上大勢至菩薩寶訓修淨業者先跕腳步將一字抱緊再由是一非一非一是一必須跳躍自在動靜如如隱現無蹤隨時互應澄心覺照娘面翻身即見自知身泯心泯性佛兩忘惺惺寂寂寂寂惺惺知冰即水知水即冰萬派歸原澄清一片不空而空空而不空此不把握中之第一把握也如此前行那有落空之禍自有持手之拳持手二字本是二乘知見若能恆順衆生非持而持非守而守則更進一層順覺性而修行則諸般圓頓知習因而幻染則萬事成空舉二念則障門全開收一念則諸魔匿迹念起則煙霧頓生心靜則十方映徹若能滴滴歸源自然此感彼應爾修淨業人宜虗心聽之明華嚩囉哆菩薩寶訓吾在晉遠公蓮社中習坐禪法凡坐禪者必先坐定調和氣息氣平後以眼觀鼻鼻觀心盤膝而坐不偏不倚心中不思一切念心如水毫無波紋縱有人在旁戲笑吾耳雖聞而心不為其搖動此坐禪之始也坐定數日妄想不令生如此再坐數日妄想自少此平心定亂之始也不坐禪時心能常定坐禪時心更易平心平則氣和氣和則神凝神凝後加之念佛念念心頭即見各各聖像令人心清氣爽自覺欣喜又兼畏敬一切世情均皆忘却此時仍當攝心念佛若一動念轉瞬間一切異景皆斂只吾身端坐於此下座出門仰觀俯察仍是一團濁氣大非定中念佛光景矣因作偈曰光影搖搖浮欲起衆生不在乾坤裏水精如來現全身蓮花脈絡玲瓏矣若論念佛神念口念有聲無聲均不必拘總以神光內凝名為三昧入手須用兩耳自聽其音神不外馳妄想自退久之彌久心光心聲一片靈機以靈薰靈便能感佛此換骨之訣口送光中之音出耳收音中之光入以威光自養其心神心神圓聚妄念自除人之所以不能如佛者非有所不足也皆由無始以來習氣種子未能除盡不善養心邪則內侵以念引光出入轉薰非出非入無內無外久之得大自在並無可以告人者普慧菩薩寶訓吾觀末世衆生情緣纏迫障垢難消雖得法門不求精進稍知覺悟便要稱能忽忽一生仍作飄流之客悠悠半世猶無證果之期受三皈者轉念不敬三寶求五戒者終久難脫五衰苟有真修之士尋求出世之方能知念佛易念心難口念易定心難慚愧前隱發心今現現中之隱全為隱隱中之現非為現能知此中之理自然一念全消萬緣皆寂非隱即現非現即隱不空而空空而不空非心非相非相非空有空有相了却真空法門無量妙在其中衆生勤心辦去莫作泛泛之翁而説偈曰一句彌陀萬法通分開混濁出凡籠若能念得彌陀徹便是莊嚴極樂翁圓朗音聲法力窮耳根管照入心中靈光交護包天地忽聽西山一棒鐘三教歸原本是空生生了脫萬緣通悟明根本方為悟一箇如如未易逢中天月朗淨無聲水底波明樹影橫若欲水中無影迹須將障垢了生生參禪念佛兩相同只要心中徹底空一點未明魔自擾四生解脫證元通削壁千山一月明黃河源本實難尋自家心鏡分明見照出乾坤徹底形囉囉了悟菩薩寶訓嗟乎至道淪亡衆生根鈍不求正眼昧却真如以正為邪沉淪胡底以苦為樂求道難成不敬賢良不親勝友論高論下諍我諍人學道者有口無心誦經者九訛十錯名號雖稱茫茫莫悟參求稍得狂見難消吾觀時驚愕暗地傷心苟有真修勤求正法心心以自性為宗念念以彌陀為主行住坐臥喫飯穿衣由心至口從耳入心神妙無窮妙光自露佛從光現光自佛生光光圓融念念寂靜寂非能寂念非所念一片靈機十方影現聲中自性性裏無聲聲外無聲性外無性性光含容世界光明湛寂心宗事事皆空心心是佛一佛一心一心一佛一即亘古亘今一即無形無相一是非一一即是一離一得一得一離一離一是空得一非空非空有相有相非空兩忘空有妙在其中此中領略此意無窮此中妙處誰人悟這點悟明歸淨土呵呵我昔糊塗我今徹悟問家鄉明湯湯大路蓮花朵朵層無數接同參娑婆極樂一大步一滴施遍清甘露住住住十方國土皆是人修住吾今臨壇所判皆是希賢作聖之功脫苦良方之妙劑也爾等其各勉之過去正法明如來寶訓南無阿彌陀佛宜耳根聽得清清白白字字分明管照真誠綿綿密密將心佛念得兩空自然月映千江影現鏡明影去鏡空此念佛之真詮行住坐臥喫飯穿衣順逆兩境暑寒常變一刻莫忘爾心即是淨土淨土即在爾心無箇不是彌陀無處不是淨土雖隔十萬億佛土彈指即到蓮池最忌是煩惱心傷殺心高貢心姦淫心飢笑心暗昧心執一心貪戀心喜愛心嫉姤心放逸心人我心怠惰心此皆修淨業人之所切忌也爾等照此行之休走錯路此法門是我佛慈悲開無上最勝第一方便權巧圓頓易修易證末世衆生根鈍餘門學道是險最難修淨土只要抱緊四字真言如一座須彌山靠得定定如七重香海水徹底清清一點靈知自家照破靈知圓融是假名故以假名假是名為空非空非假妙在其中六根常淨三惑自清平白地細細收清圓融他刀刀斬斷吾無多囑退名文光如來寶訓一串牟尼在手中阿彌陀佛力無窮人人趁此尋歸計朵朵蓮花氣味同葛藤斬斷即觀音無去無來自在心真體圓融皆妙覺微塵世界色成金四教原來一理通淺深次第不相同歸原悟得真空性便是蓮開極樂翁幢幡寶蓋大千遮箇箇明珠一不差珠裏三千含世界珠珠相互道人家參禪念佛本相同橫豎雖殊一法通百八慧光心口洽耳根管照鏡光融南鄰北舍幾人家失却真如路轉差總是癡迷難醒悟滿天雲霧雨噴沙經聲佛號喚癡迷鐵鎖沉江浪捲泥縱有慈航來普渡幾人能上碧雲梯吾因往劫中與爾等數人有一段淨土因緣故來此開導汝等既修淨業須要真誠屏除世俗虗名皈命一心辦道汝等知得一字否由靜生敬由敬成一由一而得死由死而成活活而復死由死而寂由寂而無由無而成有到此功夫即是一字此乃次第進步勉之智慧玲瓏嚩囉噠哆如來寶訓念得一聲佛號能使萬慮皆空千生業障一朝鬆富貴黃粱一夢何不飄然出世自然高悟元通窮魚亦可化成龍切莫自家心動悲夫三界牢籠猶如火宅一念稍差即現萬狀譬如無舵之舟何時登彼道岸夫四千八百法門雖可修持然必由多生功行備歷酸辛方得成就惟淨土一門專持名號三業便清土以念淨佛以念成隨念往生最為捷徑但能心生實信勤篤精修速超生死一切眷屬六道衆生以我念佛音光多得解脫豈非極廣大之法門乎且念佛一端不費財帛不勞奔波久久行之純熟打成一片自有大驗可惜世人聞修者衆而決志往生者希造業彌天自甘受報縱有魔頭説偈多從外道開場吾今來此普勸世人能把一句彌陀靠得定定便是脫苦良方形骸雖存東土心神已在蓮池矣爾諸弟子六道輪回沈迷五欲譬如寶鏡掩塵黃金委地須仗一句彌陀朝夕切磋去其障垢久久不懈自然消清心光透露雖在塵緣塵緣不雜淨土之因必矣諸弟子既知三界如火宅必猛勇念佛跳出火坑既知極樂是故鄉必求佛慈悲誕登彼岸修淨業必須戒殺世人習氣成風忍心相殺紛紛酬答互作高低可不痛哉文明前來既修方便正法必須將俗念掃淨只換一念彌陀自然萬慮掃清塵心淨盡明舟前來淨業人不可貪眠誤了時光能一朝覺悟名淨業大成不如此終歸帶業往生好精進去達源前來修道人要自家在心地上打掃乾淨自然明明亮亮徹底澄清洞觀內外全無礙重見當年舊主人松國前來爾修持數載濁氣未清吾贈一偈心平如水耳如聾目定神凝念亦空空到空中仍有佛佛來佛去佛空空細悟之淨源前來爾淨功稍好但辦道有先後地步由平等心至四空心由四空心至寂滅心由寂滅心至靈妙心由靈妙心至玲瓏心由玲瓏心至廣大玲瓏心若能淨功到此地步往生品位必高賜爾一偈情關愛鎖一朝除欲得清幽四戒如待到空明薰洗後如如本性自如如淨澄前來爾時動嗔火與辦道大不相宜嗔與佛兩途佛是水嗔是火最燒功德林宜時時默念彌陀自然心淨陽年無多趕快跳出羅網是爾大幸淨戒前來爾為道場之主善於領衆不辭勞倦善果將成何須多慮繞繞白雲隨意定飛飛鴻雁上蓮臺修志前來吾降此道場可喜復可歎喜者喜諸修得遇正法堅持正念後來可證蓮歎者歎衆生雖聞正法不肯下切實功夫身後何能了脫吾觀道場弟子精進者少疏懈者多徒求法名貌是神非殊不知法名二字在閻老案下不能抵攩對報彌陀一句能為萬劫千生消罪障能為四恩三有起因緣爾等修行諸人皆有神靈鑒察精進者名標蓮蕊蓮花自爾鮮明臨命終時諸菩薩將花來迎接引念佛人神識投入蓮花內所謂蓮胎託質疏懈者蓮花憔悴久久乾枯而沒臨命終時仍舊隨業受報吾勸在此弟子正念持定休要迷戀娑婆受無邊苦惱結萬世冤讐當發猛勇精進心專修一行速棄窮途而登聖境淨西前來爾勸世一片婆心無人曉得非爾不力須知有佛緣無佛緣均有一定憑據爾今後每夜向西頂禮念大放光明如來一串珠再請阿彌陀佛四十八串珠再趺坐默佛兩炷香如此三載便勸一得一好好恆心切莫退墮淨體前來爾道場之主凡事須要和平念佛原貴靜然貪著靜功一邊一遇動境便做不得主是修行大病必須動中做得主靜中更易得力動靜一致自無功夫兩橛之患緒修前來爾是女衆先導要將一句佛抱定不得搖動念得三江水徹底澄清上下貫通一氣一呼一息默記彌陀功夫到純乎其純自然一月映千江虗空懸寶鏡淨蓮前來爾修淨業須將俗緣看輕俗緣輕一分業障消一分靈知便發露一分凡事以正大光明為主清淨為佳果能將一句佛號念到不念自念功夫譬如行車輪之溜淨功到此可晝夜彌陀十數萬雖皮袋安眠而念佛如故那時一應貪嗔癡愛種種念頭不起何愁道不能悟法不能空此事一心已成而理一心仍要精進爾如直下承當一心念去自到理一心境界不可失此千載罕逢之正法勉之淨覺前來修道要緩緩而進忙也無用春間種一斗秋來收萬斛修道人心光搖動必遭魔病淨珠前來爾輔此道場衆侶赴壇香廚辦膳以致逐日定課不能劃一此後無論坐念臥念歡喜念煩惱念高念低念繞念立念聯珠念隨意念有事念無事念金剛持念當依吾囑念頭莫失到晚在佛前將一日功課回向四恩三有法界有情莊嚴淨域唱回向偈一遍頂禮三拜果一生無缺保爾臨命終時瀟灑生西無冤愆相纏賜爾四句悟之心淨業自消業消心更寂何功能到此全仗彌陀力精進行之中來前來一心堅持萬緣俱寂存心公直大道無私淨悲前來爾夜間趺坐將心經默念一百遍再坐定香一炷至交子時連衣而臥五鼓起身功課照舊畢散禪經行日間佛號二萬彌陀經二十卷寒暑無間六年後自有得力處賜爾一偈金光聚處玉盤空無相無聲法界中法界之中何物見須知此物證元通淨直前來大凡世人一經眼光射地一生所作所為未必盡善盡美無始冤愆前來相擾彼時牙關不活全賴心王心王不在平素鍊成實難戰萬劫千生之業障心不能發露被業力相隔雖有佛來亦無可奈何豈不復墮幽途縱世有大德為八部鬼神終難脫輪回之苦必須心光佛光打成一片定得超生淨佛前來爾創立道場十方七道乘念佛音光往生極樂無量今名播十方人天沾惠道場雖小衆志成城在娑婆精進修持到西方自爾高超品位生前立願須堅固好比銅牆並鐵柱萬牛拖得不回頭方可不怕蟲兒蛀若不能面壁苦行用久久淨功斷除結習終歸仗彌陀悲願帶業往生到彼岸造修亦要本性悟明方得花開見佛娑婆難修易證極樂易修難證勉之華嚴會上菩薩寶訓衆生蠢蠢皆盲瞎彌陀四字無上藥若能悟透出婆婆智慧海中稱大覺吾普明和尚也呵呵人生如夢幻質非堅富貴榮華百年而已雖有高官顯爵桂子蘭孫白玉黃金高堂大廈一旦無常將至苦惱萬分陽壽已終死歸無有況在生貪圖口腹殺業多多以他肉補己身結深冤為對報娑婆之苦可謂極矣若欲脫此苦任汝千方百計難以偷安萬劫千生何能逃脫稍有知識者修持十善可免一時對報但福盡輪轉焉能保真靈不喪真靈既喪顛倒癡迷復作種種惡業對報循環仍無了期若欲修仙萬億修持難得一人成就即或成仙終不免沉淪之苦若別求至高之路方便之門乃釋迦如來金口所宣西方有世界名曰極樂其土有佛號阿彌陀願力廣大無量無邊有四十八願莊嚴淨土彼處有七寶池八功德水蓮分九品樓臺殿閣池流花樹皆能演暢法音無女人身無三惡道若十方衆生至心信受晨夕恭敬稱佛名號一心不亂臨命終時定感佛接引得生彼國受無量無窮之樂如此至高最穩之路衆生何不早辦前程得入蓮即登不退地爾等做定課時如同佛跕金蓮聽我念佛聽我懺悔久久照行自然心淨妄想不起淨佛前來嗣後道場中每季行普佛七天每天誦佛號十二支香諷彌陀經十二卷名曰獄空大懺淨佛爾喜靜坐念佛吾今告爾第一飲食不可過度趺坐氣不舒暢心神難凝第二坐久經行要依規矩搖動串活血脈若猛然跕起血脈未通得病難治第三佛已默得圓熟一應起身走路要留神養住不可動嗔火念中之佛方能晝夜相續倘若一斷再圓甚難非用加倍之功不得如常古云寂寂惺惺是寂寂昏沉非惺惺寂寂是惺惺亂想非寂寂久生昏沉惺惺久生亂想倘一經不安隨至佛前懺悔次夜再坐再念久之純熟正念不動一佛當胸萬緣俱寂爾恐遭魔正念不動魔自不入爾心光大明蓮池伏虎禪師寶訓修道原非輕易為死生拋却已心灰任他百業千魔鍊一念堅持永不回看經念佛即參禪皆賴心誠行力全躲過一番魔語障自然獨鯉得朝天憶昔當年創道場雙修願行太匆忙今朝雖證無生忍猶歎三塗業報長性海源頭仔細尋一靈終不被塵侵無形無相包天地湛寂恆明沒古今大道能求在一誠止觀定慧運神明如來真諦何饒舌老實門中放步行顯現光中用耳修一三三一萬緣休離心離意兼離識好向軒轅借枕頭念心念佛佛心無無佛無心心佛俱即佛即心心即佛念心念佛佛光舒不念心兮即念中此時心佛兩俱空圓光交互原無物便是西方極樂翁吾乃蓮池和尚是也呵呵吾往東方世界化導有緣皈吾佛門爾等開乩吾故來此道場開化南閻浮提最惡之地乃有衆生舉此善事實也難得淨佛前來爾在娑婆普勸情緣當猛勇前進不可懈怠爾行放生會亦屬善念但去凡財何能普濟胎卵溼化諸生其靈知與諸佛無二無別只因造業彌深故受斯報報滿餘業未盡仍受冥報吾佛門廣大慈悲救度但度則度去造又造來午時地獄方空未時地獄又滿爾道場每季須行普佛七日吾名曰放生解脫懺往劫前大士現宰官身時行此功德吾今宣出是爾等大幸亦無量無邊衆生大幸文殊師利菩薩寶訓法傳東土幾千年反覆叮嚀度有緣可恨世人真信少何能安養坐金蓮法壇智慧佛光融願行雙修道自宏歎我蓮真骨肉如何埋沒業波中悲夫天仙二道總是幻中樓閣終入難免五衰人道雖有螢火頑福無非造業深坑畢竟難逃墮落修羅執一己之能何得明通大道地獄餓鬼畜生三惡道飢餓仍加刑罰痛哉紅塵煩擾終為釜內之魚百誤迷盲却比籠中之鳥何如極樂蓮逍遙自在無寒無暑四季陽春寶地經行金階趺坐速宜醒悟本源懺悔多生業障直下承當莫教此生空過正法住世如電光石火由衆生因緣已熟勸則信從西方乃有菩薩下世或現比丘比丘尼宰官居士等身指破迷津一經因緣聚足為先導者即捨此血肉身而去諸人向後持名音聲宜圓宜緩讀經要句句分明天道衆生方可聽得了了淨佛前來爾道場中每季添普佛七天超拔宗祖敬孝乃成道之基爾等宗祖超生乃孝中之大孝也每季添佛會三天超拔淹溺呵呵此道場所行功德備矣逢各懺期先具表焚化淨佛爾喜禪定聽吾吩咐如欲禪坐念佛須將雙膝盤齊擺平將身搖動四五次兩手將眼瞪揉四五次口中緩緩出濁氣四五次入清氣四五次然後凝神冬天要穿衣厚夏要衣薄衣服在身要寬大褲袍帶要鬆上下往來氣方不阻坐要直如峰四面不能有倚靠兩手接彌陀印擺平膝腿正中眼對鼻鼻對心隨息之出入默念彌陀初由半炷香時刻漸至一二炷香時刻功夫一深心不煩燥只有阿彌陀佛四字餘外無一毫活動氣雖霹歷亦不搖動念頭如水無波紋之狀功夫到此只要行心不退定力得深心光自然發露淨業易成那時仍有一番魔境疊疊現前鍊行者心性大概佛化魔來心中格外清淨魔化佛來清涼心中自然煩燥總要抱定四字真言一直念去便知百尺竿頭饒進步十方世界現全身
