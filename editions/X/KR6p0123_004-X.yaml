body:
  text: 海陵程兆鸞錄存往生徵信錄下偶來乩院竹梧清鳥語花光亦有情往事早隨流水去寶連臺上悟無生吾淨雲也爾等欲請已往諸師殊非易易且住吾往請悟師並往生諸侶咸赴此會悟和來也呵呵淨佛深情刺血婆心設此香壇有緣者臨諸師到此亦各有因放下諸緣念佛誦經功成圓滿各向西行淨佛知之乎吾永清蓮社中弟子雖多而往生不廣皆由愛戀情深真實心鮮平日悠悠忽忽以致臨命終時念頭雜亂流於五濁茲將已往生諸子淨佛所未知者同來此會副爾之請其餘帶業往生弟子本性未悟尚在蓮胎不得來此昔已臨壇者亦不復再來且佛法本空信便是有不信便無有無決自本心留此踪蹟何為諸佛所著經典深切著明世人尚不深信何況談鸞諸子欲皈依者當聽我教第一生死當頭勿退道心念佛而外常行菩薩道廣積陰功宣揚佛法不可口是心非當以信心為本能信願方切信字不實念佛不誠噫此不誠者是無善根也安得往生寄語諸子早尋安養回家莫負我叮嚀苦口光陰易過壽算難增前程速辦莫誤人身持齋念佛廣度眾生兩忘人我即證無生吾清江王錫三法名淨真遇悟和老人指破迷津皈依淨土遂得往生上事彌陀下度生靈自登極樂常發悲心吾桃源縣儒生張景遠在世二十年廣行善事後皈依悟和法師念佛往生法名淨度求生者多往生者少祇因輕忽將就即無深心又不了迴向之故也余王家營農人生前最好放生後皈依悟和老人虔修淨業往生淨空是也劫土藥難強病骨長江水不洗離愁吾於咸豐己未全家遇賊被害渡江至海鹽西鄉普渡庵薙髮十載功行不知淨業後皈依悟和老人於同治八年己巳秋七月往生淨一是也我念彌陀彌陀即心我登極樂極樂在心心佛無分參念如一了却此心萬事俱畢吾寶應東鄉七里灣草庵僧淨華是也生前念佛四十年於咸豐丁巳春二月往生佛珠在手鑪香日焚生前何善奉陰隲文吾山陽縣吳道生法名淨月是也念佛生定慧自然成三昧若不一心專安得蓮花位吾揚州北門外貧婦於嘉慶四年往生皈依悟和法師法號淨安世人不知亦來赴會憂貧憂死更憂疾百歲光陰不知惜三塗擾擾業隨身何若西方樂無極吾清江又一村人生平訓蒙專修淨業淨愁是也物我俱忘一心不亂祇知念佛不必參禪吾西壩時而樂生平常時念佛廣接情緣皈依悟和老人淨清是也偶發大心易勤修正見難私心病不去終不出塵寰吾吳江採藥人于天爵皈依悟和老人法名淨善虔修六年後販藥草亡於舟中舟人恭敬舟人姓郭已亡二年現生西力邊地吾之力也落葉不堪回首憶歸雲誰念大風歌余淮安藥師庵僧念佛四十年於咸豐三年得遇悟師指淨土法門發願往生迷時許多隔閡悟後得大圓融吾焦山住客僧於同治元年從自然庵得病血常上行猶不敢離佛聲次年三月於南草庵坐脫往生今得下品蓮花塵緣歲月如流水惡趣忙忙終屬空吾高郵南鄉百家村人遇悟和老人指示發心勤修淨土淨塵是也已聞人世將遭劫何說西方不代愁吾高郵大王廟僧於咸豐年從悟師遊方明淨土捷徑往生西方邊界亦復不勝其樂自到西方極樂娑婆情愛頓忘淨庶是也得失毀譽名利之關若不早破欲住生難吾淮安儒人何用留名百年容易過萬事空煩惱勸君勤念佛早到西方好吾高郵南門貧女淨心是也苦修二十年未嘗一刻離念佛今生西方坐七寶蓮臺亦在世念佛之功也帶病朝山走萬苦千般受祇念阿彌陀雖死不離口吾出家三十年身染瘡患於咸豐甲寅方得脫此苦境行脚僧淨苦是也人生易老歲月將終速離濁世入寶蓮宮吾海州程子春淨判是也在世日日廝閙誰知西方我家吾京都勢至庵僧於咸豐年南來遇悟和師勸修淨業今已往生驚醒火炕夢脫卻煩惱袋不受輪迴苦安然得自在吾從悟和師受戒十載之中未嘗一日離佛今得上品蓮花淨覺是也聞說吳江楓已冷且看隴首雪初晴吾淮安楊安於咸豐十年皈依悟師虔修二十八年未嘗存一惡念當獨坐默佛不覺今已往生古寺梵音千眾佛夕陽光景數聲鐘吾江陵十里鎮一念庵僧於同治年遇悟師頗得淨土正旨今已往生勞勞碌碌總成空徒用心機夢幻中四十餘年家室累彌陀怎得念成功淨佛知吾否吾陳厚夫也吾病中萬苦艱難之際一心念佛求佛接引亦因在日常聞淨佛談論雖不念佛而久已熏熟故一念真誠世緣不戀蒙佛接引得生邊界水陸從戎十二年家鄉迢遞隔江天紅塵看破凡胎脫富貴翻成清淨緣吾了悟和尚是也吾生宋時姓李名益棄數十萬家資從方外游不思俗福自到西方常顧念眾生無如有緣者少今與爾等相識既遇真正法門不可一生空過昔時我發無上心為此大地眾生故眾生惡業何時了一入迷塗終不度吾淞江儒生蘇長春是也在世勸人修淨業因實信得往生者纔二十二人耳其餘仍流轉娑婆可歎也一念迴光生彼國從茲再不夢娑婆吾了空也為僧九世不遇明師真為可恨遇悟師指出淨土捷徑方知造修往生放生戒殺非小善濟困扶危一大功凡我同人修善者虔心尤貴始兼終吾姑蘇東門趙康生前散去家資七千餘放生靈數十億萬念佛齋僧今已得生上品可歎世間貪滋味殺生者無非地獄中往來之人也寒風獵獵吹孤雁古寺沈沈遞遠鐘多少人間可哀事夕陽回首暮雲封吾高郵趙淨香也畢世紅塵貪戀今朝大夢方醒吾周靖川也吾死後淨佛施甘露數十次諷彌陀經一千卷為我迴向又邀道侶念佛故得生西入蓮池下品請轉告吾母夕陽已邁趕快收念抱佛回家切切百病擾擾何藥能療一念真誠彌陀來保吾高郵王淨界是也安分度時光清苦自家嘗心田常淨潔念佛六時忙吾乃寶應畢有餘法名淨慶是也生西二十年安養樂無邊生前無別事念佛不參禪吾寶應南鄉農人皈依悟和老人淨恒是也四野煙消風月淡淒涼景物望中生吾寶應北門貧人遇悟師指淨土大路闔家九人䖍修淨業戒殺放生往生西方亦大幸事淨修是也一番風景催孤鴈幾度衝寒放旱梅吾於淨土法門用去家資結諸道侶念佛三年後遭回祿房廈一空吾道心不退今已往生淨嚴是也水過平原知北向人留苦海不西歸吾淨圓是也住世奉行陰隲文出世勤念彌陀父若能世間均如此福至災消神佑護祇因眾生皆昏迷殺盜淫妄無其數自投羅網自遭殃各向三塗覓門戶如來垂手大慈悲眾生何不蓮宮住吾高郵西門張德昌淨利是也人身住世苦無常白髮蕭蕭兩𩯭霜幸遇悟師來指出虔修四載往西方吾高郵西門七八老人淨羅是也十里東風未暖一天細雨難收祇為懸乩相聚半灣壩口停舟吾本廣西儒生死後上帝念吾在世無過聽吾散蕩命吾此處為神今皈依真一道人念佛往生淨土慕君等篤志特來結淨土緣君等果能深信篤實修持當悟取彌陀即自性也莫戀韶華好玉梅花落鶯聲早春去了人壽光陰剩多少世事空煩惱五更雞唱天將曉休草草一句彌陀是真寶真一道人淨真來也信者聽吾言不信各分散華子爾父茹素有年頗有善根惜淨業未修塵緣難脫嗚呼茫茫苦海去何所之咦蟾蜍射處光先得蝴蝶迷時夢不醒會得否念佛築根基積善培枝葉西方十萬程往生祇一瞥吾名淨淨姓吳雲夢生徒也現主此壇可常領教依然風俗澆漓甚誰識幾希道在斯此後依依休別念隱微得失寸心知淨雲來也爾等體上天好生之心天必賜汝以福百善之中莫大於戒殺放生物命不拘大小悉宜救濟若行之久遠生獲福壽死必往生吾不妄語也濟世休言易䖍修莫畏難西方程億萬片刻刻乩壇吾道光年間人丹徒繆香山名繽者是也奉雲公之命為淨清判濟世方今年青帝司權土氣當衰往歲冬溫春來多寒染病者宜表散溫攻姑立一方濟世七朝鐃鈸鬧喧嘩不識西方是我家速早修持尋出路旁門外道等狂花吾京都觀音庵覺信是也此壇念佛人雖多而識得念佛原由者却少大半借念佛裝飾門面貪圖利養此外道通病以後當各勤正念勿負我佛慈念眾生之意也曾記春初碧草嬌那堪此日盡蕭蕭山村水郭煙俱冷古寺荒城色正銷觸目暗傷時已暮關情應念鬢全凋休嗟四野多衰颯且向荒壇判爾曹吾淨雲也淨觀所問淨業之書雖多其理則一能識得一萬事俱畢龍舒淨土文可常看楞嚴經大有益處其餘經典各有了義行世以周安士全書足矣李二曲全生錄研幾錄最簡可看也記得東風拂關心又到冬與君相別後今日幸相逢吾朱覺圓是也光緒甲午秋將以往生徵信錄付梓又念悟師蓮社弟子近時往生者必又有人余刺血書表䖍請臨壇又得若干人因並刊附前編兆鸞謹志
