body:
  text: 海陵程兆鸞著厭塵雜著表獄空懺表歸依三寶淨業弟子某甲披瀝一心稽首哀懇於十方虗空微塵法界常住三寶三世諸佛釋迦彌陀兩土諸佛菩薩權現七趣諸佛菩薩金蓮座前表為塵剎三塗受苦無量乞恩赦罪提超生事竊弟子悲憐七趣之中惟三塗衆生倍加苦惱無論過去現在未來或輕或重有經千億劫不得出苦者皆由衆生在日貪徒口腹殺害生靈奸淫妄取損人性命違犯天律污穢神靈謗毀三寶刺佛身血大奸大惡不孝不忠阻人出家十惡五逆如此愚迷顛倒積業深重蒙昧真心罔知懺悔以致業風鼓蕩羅剎森嚴一日三時身羅冥罰即稍有知覺求救無門此魂受報罪由自取惟生佛一性人我一心他墮苦趣何異己受弟子思維再四心實難忍欲思救度力弱形微今惟哀懇諸佛菩薩俯鑒弟子愚忱宏廣大慈悲度生之念以大悲願力發大威光明使三塗受苦衆生罪難逭者准以輕罪超生罪可原者隨弟子念佛歸依出離劫苦謗聖罪業捐除殺淫惡業化解即真即真破妄破妄無心清淨無法離塵生死脫根光明無礙步步蓮花神威莫量四生不歷九品咸登碓舂鋸解咸依朗慧之慈雲鐵食銅吞頓化清涼之甘露冤江怨海悉變蓮池障嶺圍山俱成寶地悲號翻為解脫暗昧自爾光明無論此國土他國土此世界他世界無量國土無盡世界凡沈溺三塗之慘慘孤魂悉仗佛恩盡度區區弟子惟願佛臂常垂慈悲導入香林屢蒙超拔陸續咸登淨域共享安全懺懺精誠拔其餘而脫苦季季普濟提在後以求生各獄空明同登妙覺乞恩鑒許感戴靡涯謹表施丹濟生表表為施丹濟生事竊以蠢動蜎蠕性光本具胎卵溼化法味難沾弟子等體佛聖慈心發真誠念力靈丹普散甘露咸施仗佛威靈無邊普濟江湖河海一水不遺田道山林無方不遍稍入生靈之口即了業報之身諸佛存救護之心萬劫下慈悲之種不遭刀爼永脫樊籠了了了了無庸對報來生空空空空不待遭殘自死仗此一塵一滴度脫無窮須知即幻即真超生莫已業海風波頓息寶筏咸乘香林功德無涯蓮房極樂懇誠上達惜命知立命之原陸續西行救生證無生之域干犯慈顏乞恩准許乞消災厄表表為乞消災危事竊以疾風淫雨孽報所招春疫秋瘟人心自感理懺則罪業本空事懺則冤纏悉化願諸佛不違本誓不捨大悲放大智慧光大安樂光大吉祥光攝授散疫鬼神來此道場聽經念佛借念佛音光銷其瞋怒解釋災殃熱惱悉變清涼毒恚轉為愷悌業垢皆淨災難自除普願免厄諸人信願持名增長堅固一心不亂三昧早成伏乞慈悲哀憐允許超拔淹溺表表為歷劫淹溺乞恩超事竊江湖河海悉屬險途羈旅往來或難越境風狂浪涌命喪身傾又或積憂憤以沈淵遇讐家而投水以致冤魂幽滯討替無休言念及斯實深悲憫今弟子恭設道場若干日仰仗諸佛大悲願力大威光明無論此世界他世界凡在江湖河海㵎溪港瀆井泉塘水淹溺諸魂蒙光得度念佛超生解釋冤仇不思對報仰接慈暉伏乞准許超祖宗表表為報恩設懺普植蓮因事竊弟子幸得人身生居震旦獲聞正法復遇淨緣真我佛啓誘之深慈千古偶逢之際會惟思身自何來恩於何始上推一本罔極難窮弟子劫劫昏迷未知圖報以至多生父母仍滯幽途歷劫祖宗未登彼岸愚頑自咎罪戾滋多今弟子上叩慈恩仰求濟雖心雄而力怯冀有感而斯通今集諸道侶恭設普佛道場若干曰敬誦大乘經若干卷普施甘露法食哀懇十方諸佛菩薩憐弟子愚忱鑒度生微願施大威力放大光明使弟子由無始至今生生世世父母祖宗魂識及生生世世父母祖宗各各有生生世世父母祖宗魂識以情達情情極無邊以緣接緣緣推無盡如此無量無邊不可數說之情緣散在十方七道衆生中者均仗三寶威光攝授來此道場聞經念佛執情頓化意地了然懺悔前愆羣歸極樂無邊苦惱頓化蓮池法界有情同成種智謹表挽劫表表為懺罪挽劫事竊以罪性本空造業亦妄由心莫了幻感幻受種種幻慘羅列目前造既純熟報亦猛厲業山事造懺以事除於無可懺悔中而求懺悔於無可挽回中而求挽回今為大地衆生於三寶前痛自悔過使知三寶當敬當信使知三寶是大地衆生真實依怙於身口意三業柔順五逆十惡毀犯綱常種種重罪悉令警醒懺悔清淨藉念佛力普熏衆生一一心識速熟速脫仗陀羅妙力消滅罪報如虗空華消劫既盡令彼衆生助揚正法同歸淨土謹表偈臨終助念偈此係悟和長老所言兆鸞述偈弟子某某我自無始來惑業顛倒力諸趣數升沈恩冤何窮極由結恩冤力償索無底止唯有大世雄指歸安養世我已發宏願救濟無休際懇諸恩冤等待我往生去若我往生已決不虗所誓既恆轉法輪劇苦必獲濟今對三寶前所誓無纖欺諸佛阿彌陀證盟所願誓悟和法師云行人命終時全賴心王不捨一念直超然非平日下切實功夫一心不亂臨時識散神昏不能自主多生業障現前隨勾而去矣吾江南北弟子以萬計利根甚少不求精進善芽偶發曰久乾枯臨命終時全不濟事故知帶業往生亦必藉助因為嚮導也今留此偈爾等平素念成佛圖一張多則佛號四千八百萬次亦四百八十萬至少四十八萬刺血書文並佛圖供奉佛前倘臨終神識昏迷即將此圖與表令子女在佛前䖍誠焚化再請五六人在榻前念佛亡人得此助念意根清醒即可抱佛西行氣絶後不可搖動尸體仍高聲念佛兩炷香再穿衣收殮因人一點真靈投胎先來尸冷後去彼時切忌號啕動其塵念塵念一動即難往生此專為功夫未純者設若有實力實悟自能作主不須此也若父母翁姑不自刺血者下人代念代刺亦可孝為之也焚塔偈皈依三寶尊優婆塞弟子法名是淨佛誠恐並誠惶稽首復頓首刺血書願文哀告於十方無盡虗空界娑婆同極樂兩土聖賢尊並諸菩薩衆金蓮花座前世間之重恩莫大於父母次則是師長我自出胎來父母養育我我漸成人時師長指教我我從無始來劫劫昏迷倒父母與師長久沈七趣中無由出諸苦凡在胎卵濕化生亦復然是能生我者皆為我父母推而廣遠之互相父母者其中造惡業無量又無邊其中修善果微末芥子許善惡於其間結成諸眷屬父母暨師長親戚共朋友誤傷兼食噉債主共冤家劫劫世界中七趣升沈苦對報復對報循環無底止望之久待救無由脫諸苦今幸得人身生在中華內大清咸豐間又遇明師示開導指迷津方知修淨土若知不報恩於心亦何忍當發惻隱心如佛度諸苦現墮凡夫地罪業又深重雖發此勝心力薄無所濟今對三寶前燃香八百炷代為諸有情互相恩冤者供養諸佛尊無盡虗空界普同供養已懇求諸納受既已納受已我及諸有情一應衆生中各各業垢盡虔禮懺願儀普薰三日已焚化光明塔供養血書經共部三十二仍有祖師論一十八本竣過去暨未來蓮座諸聖位供奉七級已報我生養育仰仗諸佛威普光明勝塔神力攝虗空上照自有頂下至五無間橫照於十方無邊又無際恆沙世界中四維並上下大光明普照皆仗諸佛威神力方如是衆生於其間聞經得解脫覩光業垢淨普起信願行各各決往生從此脫牢籠同向西方去蒙諸佛聖恩諸大菩薩衆乘蓮降道場為我作證盟聽我誦誓願我今發弘願刺血書尊經大乘並祖論上報四重恩下濟三塗苦恆沙世界中有情非有情有緣非有緣一一佛土海土土衆生海七趣諸道中互相情緣者若有見聞者悉發菩提心無異彼等刺何殊彼等書普薰諸識種無一能遺者彼皆成佛已我方妙覺證莊嚴一寶塔供奉盡虗空直至未來際土土正像時我現身接引寶塔速現前光射於十方無邊又無際光照諸有情光照諸有緣種種無間業沈溺苦衆生光照即發心蒙光諸宿種聞即欣樂深熟脫或頓漸祕密不定人普起信願行各各決往生往生安養國各圓種智成盡法界三寶證盟我素心亦自寶塔光演出無量音音演說此塔函血經文言音即清朗聞即各悟心心心悟速取證妙覺各速臻佛祖經文妙祖師法乳真橫竪對待理絶待自爾增絶待既增已欣厭自切情欣厭情切已安養決定生以此書功德回向諸衆生花開早見佛各各證無生或現隱於顯隨類各現身度脫華池內我願與衆生直至未來際虗空界盡衆生界盡衆生業盡衆生煩惱盡我此寶塔無量光中無量音聲遍傳無量佛剎中永永無盡傳悟和法師傳略師法號瑞安俗姓高京都人幼年多病父母許願出家九歲剃染彌勒院授具足戒卓錫紅螺山剎專修淨土日課佛數萬後發願朝海挂單於杭州大剎默深魏公源高郵刺史也官京曹時從師問法魏外授州牧別師久適長公子赴浙遇師剎中堅請至郵刺史喜甚遂潔賓館為靜室朝夕問道師山林散人不樂居官衙求去者再刺史以師道行卓絶乞駐法駕又恐師引去因訪境中古剎修葺完竣遣公子及幕賓伴之入寺間步始達刺史懇留之意師知不可辭遂居焉師平日專事清修六時禮念終日趺坐游人至寺瞻矚不事送迎人咸稱之時髮賊抵邵伯捻匪攻寶應薛賊踞湖西郵當孔道岌岌可危兆鸞時從師遊一日與同修八九人詣師語及亂耗師垂涕曰衆生殺業如山現在命命填還無非宿生業報凡夫未證宿命通自不知耳諸子若發菩提心雖大劫難挽蕞爾一隅可安然無恙衆跪乞慈憫師於是刺指瀝血書表焚化佛前又燃臂香百炷余等亦各燃臂香均為揚郡人民懺業復白衆結壇念佛七晝夜諷經三百卷結懺日僧俗會者二百餘人師披法衣䖍誠禮佛哀懇祈禱用楊枝水遍灑上下四維繞持大悲呪一百八遍率衆繞墀念佛天明始畢後賊果及隄而退民以安皈依弟子日衆師拓寺西廊三間為蓮社每六齊日率衆至社限定功課午前念佛六炷香諷經六卷午後傳幽冥戒律講經半炷香晚間施甘露斛食率以為常丙辰春水軍統帥黃開榜駐扎湖西藉寺東廊為鑄炮局兵官往來窺瞰丈室師趺坐不事應接榜部下怒其傲遂進才說於榜講師惑衆依附者多恐成大患一日榜至適逢社期弟子會者數百榜驚謂前說不誣倉卒飭兵士曳師下座以麻索縛兩手拇指懸梁間去是夜榜夢無數人向之乞命正窘急間來一長身僧揮衆散榜匍匐謝倐然驚覺次日榜至局細審師面目身量與夢中所見僧無異令解其縛扶入丈室師十指血凝腫逾十倍四晝夜不能起半月後榜又來直進丈室師趺坐看經不動榜厲聲問所看何經師曰無量壽經榜曰速講師曰說經是山野本分但統領不可草率如欲聽經須設香案恭敬作禮榜遽呼左右焚香師衣法服登座講經榜猛觸孩提時事俯伏願為弟子師說三皈依竟榜隨師至丈室述幼時樵采入山偶至一洞洞有一僧趺坐旁一長石上供經一部諦視其籤為無量壽經僧見榜開目曰爾不必習文習武可成就事業後遇吾教中勸人念佛者汝當護持與汝有益因並道曩夜夢中所見長身僧益加敬畏榜遂懸禁寺門止人窺瞰違令者治罪榜後改督陸軍他往魏刺史亦卸篆去師孤立前讒師者復說當事下之獄師在囹圄教諸囚念佛夜靜聲音嘹亮直達內署州牧感悟即日釋師嗚呼師真現地獄身而為說法者也昔紫柏大師以事繫詔獄與犯官說佛與師事同師真不愧古人當師之在獄也時仲夏余往省視獄中穢不可近師方與諸囚講地藏經處之宴然余曰師佛口婆心情殷救世乃躬膺患難衆生何以克報大德師曰爾等勤念彌陀早得一心即所以報我若懶散懈怠信願不堅即辜負我爾等以我為苦耶不過臭皮袋少惹灰塵與我何涉若能遇得千魔鍊一念真心總不回豫聞師言感歎淚下而從遊弟子因師繫獄多疑阻有退心師出獄豫延至家供養月餘時仁和許公慕師高行延至揚州藏經院主講席師仍以六齊日啓社說法受戒如在郵時弟子慕羶者復集尋以謠諑江都令又禁止住院師引去時刺史魏公子卜居金陵聞師狀延師主白下上公山未一載復下山遍歷蘇州儀徵泰州通州如臯各郡邑遇緣即開道場宏闡淨土我師往來警䇿道場諸弟子終年跋涉不辭勞倦弟子緒修者高郵觀音庵比丘尼也師在郵建永清蓮社時緒修於六齊課畢即入方丈問道或移而後出輕薄者造蜚語謂與師有染緒修無以自明對佛立誓曰我坐脫必以六月露尸五日必不腐臭若不然者我即有玷清規非佛弟子後果於盛夏圓寂坐尸五日面目如生酷暑蒸騰毫無穢氣五日中瞻仰膜拜者恆數百人無不嗟歎驚異前疑盡釋因歎非緒師真修不能得此靈感非悟師化導不能成此真修俗眼世情何足深責師戇直寡言外和而內毅雖專修淨業實已徹悟心源更兼六度齊修慈悲普濟迭遭患難不退菩提非證波羅蜜得大解脫者焉能如是於同治某年某月某某日從容念佛合掌坐逝弟子觀如奉龕於揚州觀音山旁弟子等結茅為廬百日乃散遺囑荼毗後不許建塔以骨燼和𩟠投江中曰吾憫水族淹滯幽途以此與水族結緣若沾粒許此水族雖微塵劫後遇吾開導必成正果噫師之不忘衆生可謂至矣贊曰師貌寢而心慈言簡而行質望之無足動人而倡導正法普濟衆生身命可捨不遺餘力實為近時所罕見師之逝也遠近聞之無不泫然出涕曰是古佛也今去耶吾何依說因果淺說茫茫天壤從古至今多少人物其中富貴貧賤壽夭靈蠢以及鰥寡孤獨盲聾殘疾種種形骸苦樂懸隔論者每歎造化不公知解之士又委之氣數升降稟賦厚薄噫誰信其業由自作耶經云生前齊僧布施尊重三寶得富貴報吝財不捨得貧窮報輕法慢教得婢使下賤報酷好宰殺得生生夭壽報戒殺放生得長壽報毀謗三寶經文得水腫乾消疥癩報玷污僧尼得鴿鴛鴦報毀謗三寶得盲聾瘖啞報惡眼視發菩提心人得無眼報惡口謗發菩提心人得爛舌口瘡報遮佛光者得為人醜黑報瞋恚盛者得蝮蝎蚖蛇報竊盜者得貧窮困苦報惡口者得眷屬鬬諍報悖逆父母者得天地災害報網捕生雛者得骨肉分離報輕法慢教者得永處惡道報破齊犯戒者得禽獸饑餓報污梵誣僧者得永墮畜生報邪見者得邊地受生報可知有一種病必有一種致病之由如是等閻浮提衆生身口意三業惡習結果百千報應不可稱計是諸衆生先受如是等報後墮地獄動經劫數無有出期此如來金口所宣難於筆罄略摘數條以見今生所受即是前生所作所謂欲知前世因今生受者是欲知來世果今生作者是可畏哉今世間不信因果從未防間欲念妻欲美屋欲華衣欲豔財帛欲多田宅欲廣營營擾擾百計千方不問陰德天良不顧傷生害命任六賊造業意識用事不知暗竊家寶反以為樂色身是假衆生誤認為金剛不壞身及至油盡燈殘風刀解體眼前妻妾子女田宅金銀一件也隨不得身一事也做不得主所以奉勸世人與其臨時悔恨何如早辦前程果於十二時中檢察身口意三業何者為善何者為惡不論何時常存省察久久功純一舉一動自合天理君子必慎其獨偶動一念毋論善惡虗空鬼神聽之如雷曾子一日三省孔聖顛沛不違與釋教夜夜抱佛眠是心是佛者其嚴密防間意地之功無異也果能時時拂拭意根清淨一旦神識離舍心頭坦坦何愁不超登福地更何至有種種牽制耶三途一報五千劫出得頭來能幾時一增一減共十六萬八千年為一小劫可見生前受樂時少死後受苦時多佛云樂即苦之根孚佑帝君云走遍天涯不見人孟子曰人之所以異於禽獸者幾希幾希之念人畜關頭也忍此幾希雖苦而常樂失此幾希似樂而實苦走遍天涯不見人正以雖具人形無非貪暫時之樂而忘却後來大苦惱之衆生也世間不信因果貪愛目前暫時之樂糊塗造糊塗受全無一點審念功夫逮至罪報無休動經塵劫那時悔之晚矣若修世間福者稍有不遂即怨天尤人豈知南閻浮提本缺限世界何能事事遂意其不遂者必因積纍薄而受享亦薄也於天何與於人何尤前世未種福因今生焉得福報後世欲得福報今生先種福因欲種福因須照文昌帝君陰隲文太上感應篇武聖覺世經及三教聖賢所說利人濟物持戒修善之事行去皆可獲人天福報惟三界內神人不過暫時息肩福盡壽終三途有分惟修淨土者一句彌陀能為萬劫千生銷罪障一句彌陀能為四恩三有起因緣世間修福者須知福報無常一失人身萬劫難復古人云生死海中一經耽染便成墮落盍早回頭長辭六趣乎修行者殺戒最重世間貪圖口腹任意宰殺大雄氏現身說法首垂殺戒蓋以蠢動含靈萬物一體胎卵溼化各受業報而來一點真靈與佛無二無別既有知覺即有痛楚物命雖細痛無兩般無奈薄俗相延視殺生為常事世間富貴人原是多生作福祈求享受而來一經報得如願以償醉飽膏梁全迷本性屠宰烹炙習以為常不生憫惻之心不顧刀砧之慘羶腥惡氣充塞兩間怨恨悲啼不堪設想至於一羮之內細命萬千一箸之嘗生靈無數待到業緣遇合終須次第相尋奉勸世人何必以口腹之微使生物受彌天痛苦生生結怨命命償還古者山川漁獵禁令有時蠶帛雞豚祇稱養老聖人體上蒼好生惡死之心時時戒懼惻隱為懷孟子曰惟仁者宜在高位吾於今之富且貴者有厚望焉如唐肅宗置天下放生池共八十一所池面寬綽今浙省西湖即昔時放生之所生既當放即不可殺願雲禪師偈曰千百年來碗裏羮冤深如海恨難平欲知世上刀兵劫但聽屠門半夜聲衆生之物一入咽喉頓成糞穢冤仇迭報有業隨身倘普天之下一日戒殺計算生命何止億億萬萬生全一物已合天心況多命乎至於祭祀神祇禮教之士往往不肯禁殺而經云水陸神祇凡受血食者福報盡時均墮地獄地藏本願經云雖天龍鬼神悉同受之善果録云江西鱘魚嘴其河最險神最靈商賈往來必殺生禱祭崇禎間三昧祖師過其地夢神告曰我以一念之差墮於血食之神今受禱祭殺生甚重恐福盡入地獄懇師明日為我授戒以後祭我者不得復用牲牢武帝經注云武帝於明初間降乩一顯宦家勸人修善且云吾已皈依佛門與韋䭾天尊同護正法祀吾者勿以葷酒高僧傳云洛陽僧世高漢靈帝時振錫江南行至䢼亭湖此處有神素靈禱祀不絶神忽在空中語僧曰吾昔與師學道以宿布施故享多福以嗔心不改死墮此神今福盡命在旦夕以禱祀多殺恐墮地獄願師救我師令現形向之持呪並為說法悲淚如雨身形即隱得離惡報以上諸神尚以血食墮落為戒何況薄福世人易曰東鄰殺牛不如西鄰禴祭亦寓戒殺之意梁武帝以為犧牲後世非之而一念之仁隱銷殺戒亦不可厚非可見世人祀神與其血祭不如盡禮殺生以祀求福得災豈不悖哉至於祭祀祖先盛備牲牢此富貴家積習抑思凡軀報壞一點真性各隨善惡受生來享與否尚在未必而所殺之生先宛轉就死於刀砧之下揆厥情形當亦非先人所樂後人祭祖原係不忘根本果其蔬筍備物亦足明虔致敬無忝孝思而世之祀先竟有為祭畢自饌因而殺生者尤為非禮大聖人云雖蔬食菜羮必祭又云禹菲飲食而致孝鬼神未嘗明言殺生也昔阿難尊者見五百餓鬼歌詠而前阿難問佛佛云其家子孫為彼修福當得解脫是以歌詠又見數百善人啼哭而過阿難又問佛云彼家子孫為其殺生設祭不肯作福是以啼哭今世人一經有病或因病愈眷屬祈禱殺生還願血祭邀福豈知最慘之症大都冤怨相報者多世人又復殺生禳解而不知念佛懺悔豈非業上加業夫解冤之說有二明解者藉佛力懺清冤業若非壽盡病機自轉善念自生暗解者病人陽年已終仗佛力十念往生可解佛時和墨國王之母寢疾經久不瘥當備牛馬猪羊百頭祭天佛懷大慈愍王愚癡往詣王所為王說法王聞法覩光慚愧悔過遂不祭天母聞情悅所患立除戒殺獲福豈非明驗世儒不知因果斥戒殺為謬談因並非佛教殊不知古聖人慈心愛物恆露言外所以文王有七十食肉之政限以七十則壯年食肉者少矣禮曰魚不登尺不食又曰天子無故不殺牛大夫無故不殺羊士無故不殺犬豕無故不殺則有故而殺者無幾矣不登尺不食則取者少而生者多矣君子遠庖厨聖人不綱不射宿雖有釣弋所殺亦微乃知盡性知命之士淡泊自甘肉食為鄙取物以節愛物以仁取物以節即戒殺之謂也愛物以仁即放生之謂也昔東坡曰豫少不喜殺生有餽豫蟹蛤者即放江中便令不能全活亦較烹熬為愈永明壽禪師初為縣庫吏取庫銀買魚放生法當死聞將刑喜曰吾放生不知幾千萬萬此番雖死必生西方彌陀佛國吳越王錢鏐赦為僧賜名延壽後發明心地專修淨業開寶八年坐化梁陶宏景號山中宰相其徒桓愷先得道飛升一日降其室曰君陰功大矣但所修本草以生物入藥功雖及人而害生命上帝以此譴怒景悔之乃以他藥可代者別著三卷以贖過宋史程明道主上元縣見鄉多膠竿以取鳥命折其竿然後下令禁止呂原明為郡守署中多蓄笋乾魚臘以代水陸生命宋諸暨縣令潘華出禁捕魚後奉詔詣闕夢江河中魚數萬皆號泣曰長者去吾屬不免烹矣華異之作夢記囑後來邑宰至孫真人救蛇而獲仙方劉彥回放龜而脫水厄陳士安不殺物命李奚子拯濟飢禽景向之酷好放生積功纍德以至登仙好生之功如此其大殺生之業自必不輕晉時杜永年家巨富有子十歲暴亡未幾家中母彘生五子一最肥將殺以餽官有比丘見之謂杜曰此㹠是君兒也何相去百日而遂亡耶沙門一言而去其家但聞異香撲鼻遂憐而養之明方孝孺父將營葬夢朱衣老人拜曰君所選穴近我住處幸寬三日俟吾子孫遷盡當為後報言訖再三稽首其父寤而不信啓穴見紅蛇數百盡焚之復夢老人泣曰我已至誠哀懇奈何使吾八百子孫盡付一炬汝既無慈悲我亦圖仇報後生孝孺觸怒成祖夷十族被殺者如蛇數梵網經云佛子見異類當發菩提心楞嚴經云殺業之報縱使經塵劫互相食噉命命償還猶如轉輪互為高下華嚴經云殺業之報能令衆生墮於三途經云衆生造殺業墮畜生道者有二種重者為定殺業如牛馬猪羊雞鳬等是也業輕者為不定殺業如山林禽鳥之類是也況循環六道改頭換面焉知畜道中不有六親昔寒山拾得同一人行見道旁人騎驢驢不行騎者加鞭二大士歎息同行者問之師曰此驢乃騎者三世前父也由此類推殺生何可不戒奉勸世人見他宰殺生救度念哀憫念痛苦念見人放生生歡喜念脫難念讚歎念昔觀音大士云凡夫作業首在色食兩途色途稍知自愛者尚知節慎若口之於味恣其嗜好視宰殺為兒戲天下滔滔積習難返今世間富貴之家不獨牲畜傷殺已多更用魚蝦等子作羮破卵毀胎動輒億萬經云魚子不經鹽漬三年尚可活昔宣和間富商楊序大書此語於通衢見人買魚勸投子於河中又出資搜羅魚子後夢神告曰子本逾期當死今活生命不止億萬爾壽可延果享年九十八歲無疾而終昔佛世有羅漢福度衆生因次教化遇一女人字曰光目設食供養羅漢問之欲願何等光目答言我以母亡之曰資福救未知我母死生何趣羅漢愍之為入定觀見是光目之母墮在惡趣受大苦惱羅漢問之汝母在生作何行業今在惡趣光目聞已含悲答言我母所習惟好食啖魚鱉之屬所食魚鱉多食其子計其命數千萬復倍尊者慈愍如何哀救如此看來一臠之嘗多償一劫之報不可逃也奉勸世人縱不能戒殺倘遇魚子必令放之河中積久數多最為方便佛云念念仁慈造天人福德身念念害生害命造地獄畜生身護生之道隨地存心勿以善小而不為勿以惡小而不戒由小及大推物及人自能善氣充周太和翔洽矣昔列子仲尼篇引孔子之言曰吾聞西方有大聖人不治而民不亂不言而民自信不化而民自行蕩蕩乎民無能名焉其時三藏十二部經未來東土孔子不得聞其教所以儒釋兩家動成水火豈知我釋迦如來憫憐末世衆生由兜率天降生中天竺現示王子出家苦行成道作娑婆教主為衆生慈父紹七佛位是天人師真聖中聖天中天莫大於佛莫尊於佛矣三教心源惟佛明了一切萬物由佛出生儒書精者可為佛法先導世出世間諸法均不外乎佛法豈容擬議半字世儒拘牖下之見未窺貝葉以僧律僧戒異乎世法遂大言狂說目為異端及察其所學不過文章詞藻刑名法術而已於聖人之心源道統無關也考其所行不過驚愚飾智放浪形骸而已於先師之遺言往訓無涉也惟歷朝理學名人多通釋教往往由此悟徹心源經云四大部洲內得貝葉遺教經文者一萬九百國其餘國土衆生福薄不堪聞教佛法住世遭遇甚難幸而值遇正法已是多生供養諸佛種植善根若不趁此靈光痛改前非苦志辨道吾恐一失人身萬劫難也世間求道之士或修習禪定或堅固吐納希冀得道飛升長生不死此種人意中以為求仙已極修道之量豈知修習仙道勤苦難成即幸而得仙福盡難免墮落經云有宿德者福報現前能生天道天仙福盡有宿業者惡報現前復墮三途善惡兩報熟則先償七趣循環永沈苦海涅槃經云雖至大梵天身乃至三界極頂壽八萬四千大劫不了妙覺明心五衰相現還墮苦趣如此看來雖至成仙在佛眼視之仍是未出生死之凡夫也惟佛為大醫王能療世間諸苦毒煩惱如欲脫離苦網除非依佛住依法住依僧住勤修淨業念念彌陀果得極樂往生永與三界隔斷一了百當切勿游疑若已知淨土法門尤必須明白正助兩因正因即是念佛助因便是持戒戒門甚廣而以根本五戒為總綱即戒殺戒盜戒淫戒妄言戒飲酒也五戒既具自能諸惡莫作衆善奉行此兩語出文昌帝君陰隲文前明蓮池大師為淨土法門砥柱一時名公巨卿皈依雲集常云住世陰隲文出世彌陀父今世間亦知誦陰隲文而於諸惡莫作衆善奉行恆視為老生常談昔鳥窠禪師曰諸惡莫作衆善奉行兩句三歲孩童說得出百歲老人行不得旨哉言乎阿含經中阿難尊者亦云當知諸惡莫作衆善奉行昔善現菩薩勤求佛法遇一女人如佛示現善現菩薩稽首恭敬女答曰諸佛妙法無量無邊我之所聞祇有半偈諸惡莫作衆善奉行而已善現聞之身心清淨洞達義旨可見行善戒惡乃修道之根基根基不立善芽不茂如念佛之人奉行此兩句為助因如乘船遇風速到彼岸也人所以不肯求生淨土者由不知地獄報之苦且久也凡世間大奸大惡不忠不孝刺佛身血污犯僧尼阻人出家壞人道心者入無間地獄此獄受苦無間無有出期地藏本願經云此界壞時寄生他界他界次壞轉寄他方他方壞時展轉相寄此界成後還復而來天地有變壞罪業無了期無間之罪如此其重其餘作惡受報雖不如此久遠而衆生生前所造身口意三業有罪必報無幸免者地獄報盡將已往傷殺生靈一一填還畢然後為貧苦下賤之人若由此植福即得福報既得福報易於作惡一朝失足頑福消盡仍從墮落其中由富貴而貧賤由男身而女身由地獄而畜生高下低昂輪轉不已由此觀之實實有地獄境界即實實有受報之身若將信將疑懶散懈怠一朝惡積報來難保地獄無分若謂有福且享有惡且作待得報來有罪再受吾恐刀鋸鼎鑊在前悔之晚矣凡墮無間獄者神識昏迷雖欲念佛而業力遮蔽一字不能出口可畏哉一四天下中惟南閻浮提人心最惡殺盜淫妄終日無休而古來成佛作祖多在此處何以故以人心猛利易於發真實道心非比他洲人修十善福止生天經云西洲人作惡微末至今風俗敦厚人壽千歲究因不信佛法雖得生天終是未脫輪回由此觀之欲免地獄非修善不可欲免輪回非修淨土念佛不可念佛即可發真實道心既發真實道心成佛作祖直下承當豈非世間真豪傑乎世間有今生為善而遇惡緣者有今生作惡而享福報者遂肆然以為禍福無憑報應顛倒並將因果之說一並抹煞豈知冥中福罪兩報熟則先償譬如種樹先種者先開花結果新種者雖加倍培植一時未能成陰即刻開花結果即此理也王龍舒先生曰人有見目前善惡未有報遂不信因果而因不信淨土殊不知善惡未有報者非無報也但遲速耳昔佛謂阿難曰人有今世為善死墮地獄者又有今世為惡死生天趣者阿難問故佛曰今世為善死墮地獄者今世之善未熟前世之惡已熟也今世為惡死生天趣者今生之惡未熟前生之善已熟也熟處先受報譬如缺債急則先還感應道交不容先後錯亂凡夫業眼遮隔不能洞悉幽冥遂將因果念佛等說一概抹倒己既不信又復教人不信即此一念之差一言之妄口業無邊暗損陰德為地獄根本若能深信因果念佛之念自油然而生由此一直前進明心見性不難世人亦諒吾苦口否須知修道直捷之法莫如念佛念佛法門乃如來憐憫末法中怯弱衆生指以方便法門此門圓攝圓收殊勝奇特能出三界火宅能三途劇苦勤修福善僅得生天天福受盡依然墮落惟念佛往生淨土一生可補佛位若毀謗不信永墮地獄可知南無阿彌陀佛六箇字功德浩大有不可思議之力難得今生遭遇正法當捨却身命併力念去雖衆生善根厚薄不同譬如沙內淘金根利福厚者眼明心慧自當早得即鈍根下智果能勤求不懈緩緩拾取舉不空手而回如有同志當不河漢斯言矣昔何尚之對宋明帝曰百家之鄉一人持五戒則一人善十人持五戒則十人善行一善則去一惡去一惡則去一刑一刑息於家萬刑息於國陛下可坐致太平矣可見持戒信佛不獨為出世要法亦是治世良方吾願讀書知理之士信之奉之不致毀謗造業吾知是人必已深明治術通達事理矣詩厭塵追溯數十年來學道苦志成七絶八首不敢言詩遣悶而已兼勸同修幼來負笈從師訓深望書香繼昔賢忽爾中年天下亂倉皇一棹避烽煙從茲棲息向荒村拋絶韋編事酒尊偶爾相逢皆牧豎却從何處問心源似箭光陰草六時蓮緣遇合勸修持名心未倦歸林鳥大道雖明暗自疑疊蒙知識寄書多勸我除煩執太阿惟有寶王三昧法橫修淨土念彌陀從此搜羅淨土文晨鐘一棒耳邊聞方知幻體皆虗假太息蘭膏枉自焚娑婆學道最難成火裏栽蓮念貴真鐵壁銅牆堅不撼方能撒手出紅塵塵霾不使鏡臺封混俗和光一世中幸喜猿韁能勒定六時長對佛燈紅密密心頭五十年海隅落日盼西天吾家本是蓮屬一葦東來度世緣
