body:
  text: 海陵程兆鸞録存往生徵信録上六通圓朗果方成無去無來見本真一念空明除痛苦十方寒冷變陽春金鐘敲破難醒彼木鐸虗懸罕度人待到機緣成熟後芒鞋擲去出紅塵吾永清蓮社悟和是也宿雨初晴新春漸換娑婆光陰如此迅速白頭修道不知就裏玄機能不生畏懼心耶能不生勇猛心耶道場弟子功深者已往生其未往生者又少一歲了少年易老老更催殘此時若不精進更待何時一朝命盡閻君案下對報無情那時喚地呼天悔之晚矣阿彌陀佛在苦海接引衆生但念佛名即登聖境最怕疑而不信心願虗浮行而不恆始勤終怠果然一念真誠即得橫超三界若悠悠忽忽障重心輕自願不堅豈更有妙法度汝偈曰莊嚴妙體證如來苦海茫茫實可哀我欲法船皆度去此身永不許東來一點靈知障垢深自家埋沒困紅塵非關魔力聲威重祇為諸修少利根黃金為地寶為樓不識年來幾萬秋仙鳥清幽常寂樂法音嘹喨少人愁蓮花託體皆青眼荷葉為衣少白頭饌供天廚隨意食瓊林寶所任遨遊吾楞嚴庵明舟和尚也漫說程途億萬賖祇憑四字出塵沙六時說法常依樹三聖談經亂墜花片片清流金玉注層層寶閣翠雲遮無寒無暑無煩惱隨意安閒聽法華吾蝗王廟僧松園也今往生矣四土蓮花四土香土中各各見慈王觀音常喚癡人醒大勢頻催蓮蕚芳自在閒雲三昧得清幽甘露一心涼果然業障全消盡必定香林姓字揚吾財神廟僧達源是也動念我皆知塵緣總是癡千層登寶閣五色踏蓮池樂奏清音妙功成寂滅遲袈裟常挂體春夏自然宜吾承天寺住持文明和尚是也一朵金蓮出寂光踏蓮彈指到壇場裝成寶閣無邊景燒透沈檀分外香坐上有賓皆達士龕中供佛是慈王我來此地多瀟灑髣佛蓮清泰鄉吾三觀殿住持往生和尚也苦海茫茫淨業能逃凡僧證果極樂逍遙吾東斗壇和尚樹田是也以上數僧皆悟師弟子在永清道場念佛命終往生極樂判語分明豈妄說哉我已得人身我又人身出我由地獄來我將地獄入出則事諸佛入則度魂識我度衆生靈我即西方佛吾高郵觀音庵尼緒修是也吾隨悟師到此與諸君一敘闊別流光迅速轉盼幾易春秋吾前兩世受女身又復周行六道三塗甘受苦惱度脫有緣今歸上品爾等既發心出世當行菩薩道精修六度萬行忍受諸苦盡度情緣勿生退悔苦海修持宜早一切身外之事棄之為要何必以無益俗纍誤此有限之身法音不斷演恆沙讀過楞嚴誦法華百八牟尼常宛轉六時鳥語自喧譁寶林璀璨生池畔荷氣芬芳出水涯從此芒鞋拋海內慣將雙足踏蓮花吾往生極樂觀音庵比丘尼本蓮是也師生時在佛前發願弟子逝後願幻軀不腐留勸後學師圓寂循例荼毗舉火一晝夜龕頂未焦尸但薰黑絲毫未損衆易龕供奉水師軍門萬公捨資裝金金剛不壞身乃常住娑婆矣附記於此羣生沾福慧極樂寶蓮中功德今完足全憑念佛功吾兩世前為龍泉寺持戒僧前一世為甘肅張姓子官至陝西道引見入都遇悟和長老於紅螺山剎談經兩日茅塞頓開志願皈依賜名淨廣修持三年棄官歸里每天念佛三萬諷阿彌陀經十卷晚間將一日功課回向佛前每月放生三千文喫六日齊食三淨肉至六十一歲生西歸凡聖同居土吾淨廣也老老老七寶池中苦空鳥說英雄多少都浮雲過了離離白骨埋青草呀天荒地老蓮境好歸來宜早吾韓惕夫法派淨慧也倐忽端陽處處榴花爭放光陰似箭忙人生戲場傀儡皮囊醜相何處認家鄉吾王敦仁淨修法名也悟到本來面目方知了却浮生隄邊楊柳最無情吹落飛花滿徑不是佛門廣大安能墜絮登茵堅持五戒識知音自有同修相近吾張金門法號淨源是也金門始業儒後慕長生導引之術毀家資廣行善事嘗漆一大葫蘆自製種種藥劑置壺中夏間荷壺肩上芒鞋草笠行鄉間遇人家便詢汝家得無有病人否有則量病出一刀圭輒效鄉人見之即喜曰葫蘆先生來矣悟和法師奇其人因其善扶鸞藉其鸞力悟師請佛降壇金門始知固形鍊氣終墮空亡改修淨業悟無生之理信解超羣呵呵我來了遠見紅光一片上接霄漢謂是失慎我却知是諸修念佛音光與佛大悲光相續也善哉善哉吾高淨順也悟和法師俗兄三間茅屋半欹斜貧賤蕭條是我家此日蓮瀟灑勝他年宿寞度年華吾往生陳淨鵡是也溷迹人間六十春悲歡離合暗傷神今朝修到蓮池地方得逍遙撇世塵吾往生王淨婆也非我亦非人塵勞掩性真一朝心鏡徹蓮放一枝春吾秦淨德也本是清真體娑婆業障遮花開心地淨極樂即吾家吾往生王淨主是也五陋身成障垢多為兒為女苦奔波今朝方識塵中幻含笑蓮吐碧荷吾往生張淨澄是也生西快樂說無邊百法明門豈易言棄却幻身歸自性逍遙淨域享安全吾往生胡淨陀也諸修心地總難堅皆為浮生利欲牽待到如如功行足自然獨鯉得朝天吾往生魏淨園是也滔滔苦海望無邊衆苦沈淪歷有年幸遇彌陀來指引行心從此坐金蓮吾乃智慧道場高淨志也一朵金蓮含一佛羣生度脫踏蓮花逍遙清福羣仙比却較羣仙百倍加吾朱淨空是也天花亂落如麻極樂西方吾家默坐心頭念佛興來足踏蓮花吾智慧道場錢淨願也西生極樂養天真拋却前生與後身死後渾如湯沃雪猶聽諸侶說紅塵吾智慧道場往生錢淨傳也松風吹午夢回睡眼模糊醒便歸日落西山何處是鐘聲一棒響如雷吾智慧道場宋淨寂是也一蓮含一性心淨蓮花淨君等欲歸西堅持一念定吾智慧道場盧淨香也住世全憑陰隲文出世全仗彌陀父若能兩念成一念步步金橋共玉路吾趙淨恆也生平最喜念彌陀處世無端受折磨此日逍遙歸淨域紫金臺上恨娑婆吾朱淨實也一世辛勤到白頭功名富貴等蜉蝣茅廬今日新拋却七寶樓臺任我遊萬慮皆空遠俗塵莊嚴極樂我先登浮漚幻質君休戀誓取蓮臺最上層吾自皈依悟和大師方悟過去皆幻未來一空既知出世之方何敢偷閒自逸從此精修淨業懺悔前愆全賴彌陀一聲抱定真言四字奉戒定心決真實行每日定課之外行住坐臥皆不離一句彌陀雖疾病痛苦之時猶勉力持念如此三載蒙佛慈悲命終接引年登花甲果證蓮池汝等道侶子孫當以吾為榜樣如此而修如此而證有厚望焉西方極樂世界中品上生程淨體降書此兆鸞父也衆生億類億心腸苦海遷流遍四方何不死心歸一念霎時瀟灑證蓮吾程淨戒也吾生前皈依悟法師對佛發真實信願行心念佛持素放生戒殺每日定課外助淨佛領衆念佛二十年來苦志修持未嘗一刻鬆懈故臨終正念分明蒙三聖放光接引壽盡歸西蓮胎託質四十九日花開見佛聞法授記過去未來洞明纖悉然總不離彌陀方得此大利益也諸侶各宜勇猛一人得道億類蒙恩爾等數珠一串名播十方諸佛讚歎功行非淺不可半途而止也西方極樂世界上品生程淨戒降書此兆鸞母也蒙佛慈悲攝授歸淨緣初結俗緣非後人莫懈持名念本願彌陀誓不違吾程應佐也可歎娑婆世界輪轉對報終無了期何如生極樂國登不退地彼岸修持直至成佛吾再前一世為貧人喜拾字焚化數十年未嘗少懈今生得解元之報死後功過兩平汝母在世守節清貞又諷經茹素死亦無罪今吾孫淨佛深信淨業立社勸人功德甚大吾子淨體不忘根本刺血具表為吾兩人受幽冥戒法師賜名淨聞又代吾等行獄空大懺七日度脫歷劫以來宛親魂識媳淨戒代做定課一年孫淨佛孫媳淨珠各念佛圖四十八萬所行一一功德均為吾等回向西方子孝孫賢感通佛祖慈恩垂得入蓮池淨體問程氏宗祖吾尚未得開花不甚明了今蒙菩薩攝授方得到壇淨佛速呈紙筆吾略說數語傳之子孫謹守家規遵重佛法不忘先人修淨業之遺澤也余乾隆年間人也幼讀詩書壯遊國身列儒林名揚江左榜花開兮盻金門七次筆露垂兮步玉闕三年福種心田詎仰雙龍之望仁求書鏡敢邀五鳳之榮半世悠悠一生逐逐雖存磊落之心終滯飛騰之志鵷班未點日落西山龍鱗將成風悲北墓昔日陰曹奔走今居淨域幽間茲降乩也有厚望焉為人以慈孝為先教子以孝忠第一尊親敬長鄰里謙和正本清源安貧樂道濟人先求免死易危為安愛物必須放生臨難得救度量天空海闊性情日暖風和作種種陰功行時時方便精修十善清淨六根念佛度生放生戒殺四恩方可普被三有自爾均資世法尚可明言出世難於筆罄四生六道逐妄迷真十聖三賢知修待證與其參禪入悟獨朗孤明不如念佛往生至高極穩煩惱除時清泰之鄉得入濃情淡處菩提之路能修心意識兮全離自成華嚴信願行兮具足定入蓮念念彌陀心心嚮往直入華池之境終成歸願之堂專持一行進道無魔頓越三賢妙圓莫諭何地不通何光不接水鳥樹林樓臺殿閣具百寶色含萬道光諸剎難與比肩極樂莊嚴第一十方世界無量佛土一切人天總皆願往偈曰萬事皆空一本相同修遲修早極樂相逢西方極樂世界下品生程應佐降書此兆鸞祖也扯破情關出愛河一輪心鏡自家磨無明障翳全消盡頃刻光華湛碧波吾程淨珠也吾在世功課微末所幸信願兼全每逢智慧道場開社之期吾主持齊供操作勤苦數十年來從未煩惱壽終時淨佛在吾耳邊念佛因得不失正念大士接引生西惟功行淺薄所證甚低道場諸侶切勿效吾在世錯過光陰今日方知在娑婆精進一日抵西方修習千年何以故西方全善無惡此五濁世界不善者多修淨業人如火中栽蓮難得成就非有大信願心不能堅固不退也可將吾言傳知遠近諸同道光陰是寸金既修淨業不可學吾虗度今悔之晚矣西方中品生淨珠降書兆鸞妻也以上諸人皆悟和法師弟子往生者均以淨字為名係悟師所傳淨宗法派也
