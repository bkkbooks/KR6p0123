body:
  text: 海陵程兆鸞録存蓮寶訓下釋迦彌陀世尊寶訓原判詩一百數十首今擇存二十餘首微員末職任盂陵百里花封愧得名耿直一生為我性朝朝念佛度幽冥吾高郵城隍佛力無私膽氣寒問心無愧覺心安方慚報國能忠孝急進持名念佛壇吾高郵土地地獄無門實有門循環對報一時成彌陀雖有無邊力難度無明苦衆生吾掌地獄判官心欲清閒意不閒勞勞天上與人間凶徒仍比喬柯甚欲把喬柯次第刪吾副循環林宏千年怨氣恨難消一點丹心保漢朝事到盡頭難握轉空教碧血染青刀吾漢關羽身居天界到人間今日方知出世難宮闕通明珠灼爍何如橫證出情關吾等四天主縹眇天衣駕輦來五雲高處九重開簪纓舉笏隨金御齊誦宏名種福胎吾忉利天主山河有相總虗華識得歸源即是家精進持名須自悟免教落寞滯天涯吾查課童子三教歸源本是空三生了脫萬緣通悟明根本方為悟一箇如如未易逢吾監壇一誠打鐵成鋼念一誠東來業海度羣生彌陀念徹無邊力心地圓明願自成吾黃打鐵僧頽寺敗草青青但見長空數點螢有日慧光能普照慈雲法雨遍香亭吾蓮池和尚世人造業困娑婆沈溺多年可奈何速早修持登彼岸如梭歲月易消磨吾王日休極樂西方快樂天花亂墜玉琳琅法音演說齊鳴和樹鳥池流共闡揚吾慧遠和尚入定何如勤念佛大乘方便易修持一心不亂歸空寂自得蓮胎託寶池吾省庵和尚法雨慈雲遍大千登壇難把善言宣迷頑顛倒心如醉誰肯同歸七寶蓮吾永明和尚人生易過是三春莫為情緣縛一生心裏掃除心裏事夢中修煉夢中身吾文殊也蓮有路無人識寶鏡無塵永夜明可歎業河諸弟子何時功滿出紅塵吾普賢也瓶中甘露味清涼手握明珠百寶光楊柳枝頭開智慧從今一灑免災殃吾南海老衲也手把新荷著意栽薰修願足證蓮臺今朝極樂雖成果也是當年淨業來吾大勢至萬朵金蓮出寂光衆生何故棄家鄉若能反本歸原體便見莊嚴大法王吾釋迦老子是也寂光土裏老頭陀丈六金身下業河寶筏無邊橫願海祇憑本願度娑婆吾法藏比丘是也吾等無量劫前立弘誓願法傳東土普度衆生原因濁惡愚癡久迷業海欲濟大千佛子共脫苦輪淨佛今立社化導世人同修正法普同念佛功行甚多惟當時時刷磨振作一朝得一心不亂功夫摸著本來面目便知佛言非妄矣吾今降此道場為此地衆生罪重浩劫將成實深悲憫其未遭殺劫地方因有二三善男女代衆生念佛虔誠懺悔今爾等須發大願開念佛懺四十九日具表哀懇大數攸關不可兒戲劫數有無全在一念相感慎之慎之過去正法明如來寶訓原判詩十餘首今節去爾等四十九日懺期已滿諸人心光圓聚與諸佛菩薩大悲光相續不斷懺中仍有十五枝香心神不定其間少度苦厄毫𨤲之災難免爾等業眼業耳不見不聞懺中諸佛菩薩化無數億各類趣身通其言語天曹地府海島龍宮攝授道場聞經聽佛化解冤愆以消大劫諸佛為衆生悲心粉骨碎身難報萬一諸子各宜向西頂禮以謝佛恩各向虗空頂禮以謝護法諸天龍余於同治三四年夜間常夢大水不以為異獨五年夢遍地波濤不分邊岸天地晦冥雨點如卵俄見水及余簷倉皇登屋失足驚醒心甚詫異次日懸乩乞示諸佛慈悲遂有開普佛道場挽劫之判余與同修虔誠啓懺懺中第三日余寒熱大作遍體生瘡每一跪拜膚如刀割余忍病將事四十餘日不生退悔懺滿病亦旋愈一誠菩薩判云爾等舉行此懺擔荷太重故遭魔折幸菩提願切未至中輟可敬可嘉初啓懺至三十五日上河堤決二百餘丈下河大小墟堤均潰一望滔天毫𨤲之災如此倘全災更不知作何景象仍有感應者余所居勝德墟周廣四十里田三萬餘畝他墟皆決此墟巋然獨存當水至時已平墟頂勢欲灌決忽狂風大作樹捲屋是時風聲水聲與衆丁堵築聲呼號啼哭聲驚心動魄諸禮懺者不能堅定扶鸞乞示判云在壇諸人宜平心歸坐念佛此乃六欲天魔行威因爾等數十日心光圓聚欲以威力損爾道場爾等但攝定心神毋妄生疑懼吾賜符一道懸之壇中保爾等魔難化為吉祥煩惱轉成清泰珍重子初風小丑正則水無波紋堵築既易水亦頓退此墟不獨免災且穫豐稔感應道交真不可思議矣兆鸞謹志守檀橫超菩薩寶訓彌陀一句超生死念得圓融見法王萬劫千生冤盡釋剎那含笑證蓮橫超降淨佛吾生前為布客六十年買賣真實不肯少人分寸持準提齊放生戒殺死後無罪且深信淨土來此守壇我佛開此念佛橫超之門世間業識甚深往往不信近冥中大興淨業各處城隍開念佛道場已有九百三十處凡世間人死過七七日方照在世善惡各受業報四十九日內未經發落之魂識即送入道場念佛如果誠信不疑即可化解冤愆超生極樂若無深信依舊輪回隨業受報淨佛爾可知虗空諸佛設一道場金瓦玉柱琉瓈寶階宮殿直到星宿天常有諸佛菩薩往來說法上界天仙來此道場皈依受戒各發菩提一誠菩薩寶訓現冥界佛法大興東嶽大帝亦建念佛道場開導魂識凡在城隍案前不信念佛者受冥刑數次押至東嶽如信念佛送至大道場懺罪往生如再不信即付閻羅照陽世所造身口意三業較量輕重發落三塗對報出苦無期諸佛愍念衆生又由悟和長老說冥教法門感通冥中故諸神各各發心了脫生死此往劫前因緣定數此數惟佛明了吾等未證五眼六通不知無量劫前因緣也淨佛行空獄了冤大懺念普佛各七日此十四日內仗諸佛菩薩誓願威神照爾等在壇弟子由無量劫來所受無量身諸佛菩薩一一化作無量各類身放大光明照十方世界上至有頂下至無間通其言語勸其念佛攝授來此道場聞經聽佛禮懺受食醒其癡迷消其冤怨懺其罪業醒悟者自然念佛念佛一聲即吐一光此光是衆生本有之光因展轉六道罪業甚深此光不露成為衆生其上界神仙或由大忠大孝上生或由修鍊上升或修上品十善上生本來光明未露福盡輪轉不出三界佛亦名為衆生冥中神鬼二道身三塗地獄餓鬼畜生等報身所生身不一皆曰衆生三界外諸佛菩薩皆法身此道場開懺爾等念佛光明諸佛菩薩普照光明及一切衆生魂識念佛光明光光相續不斷諸佛菩薩大光明幢籠七道魂識出三界過金橋歷十萬億佛土到極樂國如彈指頃如衆生經過各土動羡慕妄念即下生所歷佛土不得生極樂國極樂佛剎無量無邊蓮池之外有疑城莊嚴猶勝欲界忉利天再過去有特羅蜜城有化城有懈慢國方到蓮池入凡聖同居土再進方便有餘土再進實報莊嚴土再進常寂光土凡修淨業人得一心不亂所歷境界皆不動念神識可直沖常寂光入寶池中投入蓮胎花開見佛若遇疑化等城動念即落邊剎蓮胎修持經劫方得花開見佛彼處荷花開合為一晝夜娑婆世界已一小劫吾今判明此吾之慈悲也勉之往生者視道力之淺深為梯階娑婆修一日勝西方千年因此處純惡彼處全善功行攸分也爾等十四日懺中所度皆諸人生生世世善惡兩緣所謂善緣者或曾為爾父母師長眷屬親朋或曾受爾救濟此即爾之善緣也所謂惡緣者或爾等夙世之債主冤家或誤傷故殺他命彼等作孽深重受畜報身不能報復畜報罪盡轉為人道因曾為爾等所殺此即爾之惡緣也善惡兩緣一衆生有諸衆生又互相有故無量無邊善惡兩緣在三界內循環對報無有了期俄爾神鬼俄爾王候將相貧民賤役俄爾地獄畜生顛顛倒倒或前為母後為女或前為子後為父或先為兄弟後為畜兄轉人道弟為兄食凡夫改頭換面錯亂因果諸佛觀之暗裏悲傷可不畏哉淨佛前問吾之來歷未便告爾今壇內佛事消閒吾告爾吾宋時進士不願在朝幼喜念佛放生茹素每日念佛五千聲每月放生一次至五十八歲發願朝普陀行至山東遇一和尚名星月問吾生平何業吾告曰由第不仕最喜佛和尚曰爾念佛何念吾曰最喜佛不知何念和尚太息曰吾看爾身有光丈餘豈知仍是娑婆苦衆生吾問故和尚開示淨土方便法門又贈無量壽經一部語録二本全說西方極樂世界吾俯伏皈依賜名一誠壽至九十三歲而終蒙觀音大士接吾生西投入蓮胎吾之蓮花周圍應世間道路四十里在極樂蓮花是最下者數百年來在花胎內念佛懺悔終不透徹一誠二字蒙觀音大士說法數次吾業障全消真性悟明花開見佛摩頂受記於凡聖同居土下品下生因吾在世只修持自己不知發願度世落於小乘今淨佛忍辱精進發如此廣大悲願可羡也監壇一誠菩薩寶訓吾一誠也呵呵道場雖小恆娑世界皆知爾等七日施丹功德可敬可嘉十方世界無量國土六道衆生沾惠無量惜諸修功行不深定力不足心光不能圓聚解脫靈丹不能變化無量尚有八億國土未能得此功德如諸人得一心不亂功夫持呪做丹時施放時不起一妄念一粒丹仗佛力呪力可化百千萬萬億億也守壇淨廣菩薩寶訓吾淨廣也淨佛等行消災懺雖不能全數消除仗佛慈悲可減一半諸君念佛亦知念佛之利乎念佛不獨自利兼可利他利他即是自利本無分別今與諸修說幾箇譬喻如屋三間屋中均是爾等債戶追討不休一時却還不清欲逃又被攔住必將債戶一一還清屋內無人阻止爾等自走出去三間屋比三界屋內債戶比爾等生生世世因緣纏縛須要一一填還債戶還清出屋比爾等念佛音光普度情緣情緣出三界屋內無人矣爾等出屋即身後生西也凡道場念佛無論風雨總要到壇冥中情緣仗佛力威光蚤一日度脫即蚤一日生西臨命終時自無業冤前來纏繞吾再說一譬喻娑婆為大業海海中魚甚多爾等是漁人取大網下海取魚魚滿網重拖拽不動反被魚墜入海若拖網時來一大力人代執總繩自拖上來大海比三界海內魚比爾等生生世世善惡兩緣爾等存心救濟諸苦比網魚被魚拖入海比誤入外道迷於世緣終久沈迷業海有大力人助泄繩頭是阿彌陀佛阿彌陀佛本取魚之人歷劫用大慈悲智慧在業海救取衆生爾等精進念佛濟度情緣自利利他非仗阿彌陀佛大力不能誕登彼岸爾等如不念彌陀甘心沉溺輪轉三塗阿彌陀佛雖張網待魚魚不入網漁翁亦祇歎息而已爾等速醒悟也又一譬喻此三界名欲界色界無色界上窮有頂下至無間人生三界中生天者福盡還墮受罪者報盡還復上下輪轉無有出期猶如三層蒸籠內裝𩟠食日在水鍋上薰蒸籠蓋却有一小眼要人會摸此何說也第一層籠比三十三天以上諸天地仙班四禪諸聖第二層籠比王侯將相貧富黎民第三層籠比冥中地獄神鬼上有一蓋蓋定一應天仙人畜不能出離三界三層𩟠食即此說也三界內天人神鬼畜生上上下下轉輪無休猶如翻籠衆生一靈真性生生世世終日薰蒸枯焦暗淡毫無光明以致不出七趣沈淪籠蓋有一眼會摸即念佛橫超三界生極樂入蓮胎得大清涼也吾說三喻皆極淺極真諸子平心悟之淨佛問悟和師來歷悟師本妙覺位化身東來託生出家挽此大劫凡大菩薩現身宏法度世多受魔難其不以為苦者無他能證忍辱波羅蜜多耳爾遇悟師幸善芽深厚易於萠動不然又當面錯過十方諸大菩薩常在世間俗眼無知錯過多矣此壇將撤吾贈爾等一服清涼妙藥保爾等撒手歸西花開見佛其法每時每刻用阿彌陀佛為丸以三昧火煉成以智慧歸源水送下自然百病消除此最靈方也
