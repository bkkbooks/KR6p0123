body:
  text: 華陀大士籤方爐中却病煉金丹九九功成火候難龍虎調勻升降合院中新竹報平安近來藥籠甚消間還把彌陀念兩三妙法回春人不信空教珠淚落珊珊吾華陀也吾奉佛敕來壇判方濟世呵呵因緣盛矣吾今所判內外丹方各四十八籤合古彌陀四十八願衆生一念虔誠自有感應內證籤方第一籤桑皮貝母用三分半夏陳皮定要陳桔梗二錢糖作引煎湯服下可回春病愈念佛四萬八千滿圖一張佛前焚化代念亦可第二籤茯苓白朮共烏梅各用三錢若手推借問此方何作引煨薑一片棗三枚請觀音聖號一千二百聲閣家代念亦可第參籤一錢豆豉四分連香茹柴胡各二錢虔誦大悲水煎服如方三服保平安臨服時先請觀音聖號二十一遍第肆籤延胡索共五加皮各用三錢病可移臨服誠心宣聖號此方屢試有神奇閣家念十萬佛二天完竣來壇焚圖有感第伍籤青皮兩地與茵陳白芷連翹共苦參每服四錢煎五滾燈心為引效如神代念佛圖一張第陸籤台烏半夏共沉香各用三分作滾湯金橘三枚去核肉煎湯服下病安康代持解劫呪一伯零八遍楊枝水灑病軀第柒籤金銀花酒一方良加上黃芩製大黃戌刻無根水煎服虔喧聖號自安康代放生命一伯佛號三萬聲第捌籤黨參白朮共黃芪遠志山萸搗若泥豬腎一枚同煎服分為三次病稱奇代誦大悲呪解劫呪各四十八遍第玖籤川芎歸尾與紅花白芷秦芄共木瓜每用二錢酒作引如方煎服自然瘥第拾籤豬芩澤瀉車前子煎服還加煅鼠矢各用三錢薑一片一服何須再用此諷觀音呪四伯捌拾遍第拾一籤三黃石膏丸一副白湯水送休恐布若待藥力性到時病勢霍然自安愈放生百條持大悲呪二十一遍第拾二籤扁蓄車前共瞿麥山藥薏仁范志各用三分研細末糖和服下可安宿持滅罪真言三千遍放生五百命第拾參籤蕎麵大黃並鱉甲紅花歸尾元胡索各用三分服五劑如方配就休妄錯第拾肆籤黑豆三錢棗五枚白前白芨與白薇各用四分煎五滾服完六劑病能回第拾伍籤茯苓枳共焦查竹葉燈心泡作茶分兩休多各錢半誠稱聖號病當瘥第拾陸籤檳榔草蔻小青皮鱉甲青蒿參草芪各用五分薑棗引三枚煎服病能離持往生呪一百零八遍放生二千條第拾柒籤桂枝川斷並當歸杜仲三錢少白薇七箇桑枝一杯酒如方十服病能推每天請觀音聖號一百零八遍第拾捌籤防風荊芥共黃芩薄荷相兼赤茯苓各用五分須竹茹服完三劑病能痊代病人速向佛前懺悔一百零八遍第拾玖籤木香扁豆與山查白芷靈仙有木瓜香附三錢蔥作引服完能變體無瑕每天發願持大悲呪二十一遍共四十天第二拾籤使君鶴虱有烏梅各用三錢病可回須用長流水煎服病人謹記怕春雷第二拾一籤杜仲靈仙虎骨膠白通草共嫩桑條各用一錢加乳沒亦須速望業冤消誦佛號十萬聲諷彌陀經二百卷第二拾二籤豬肺肝心各一具加上菖蒲和竹茹各用八分煎得熱分為十次飲下肚第二拾參籤蒼耳子共草河車薄荷荊芥豬骨髓各用一錢煎五滾誠稱聖號可春回第二拾肆籤白蘚皮共淨連翹藿梗蟬衣白菊牢各配一錢加竹茹服完五劑病能消第二拾伍籤參芩白朮一方全加上薏仁酸棗連煎服須兼薑二片誠心常服可能痊念佛懺悔早晚五串珠懺悔九遍第二拾陸籤薺苨相與柏子仁並用辰砂染茯神鱉甲青蒿各錢半奇功此用可能成第二拾柒籤歡絡經年要用殘一杯苦酒共煎含擇於寅時空心服疼痛將來換笑顏第二拾捌籤青礞石共陳膽星每用四分加金銀竹茹菖蒲同少許如方煎服病能輕每天念佛千聲諷彌陀經三卷三月第二拾玖籤三稜莪朮共紅花各用五錢加木瓜研末為丸水法妙每天一盞病除芽第參拾籤青皮草果共陳皮半夏一錢效稱奇官桂木香水煎服多年古疾一朝離每藥各用錢半第參拾一籤枳實用三分陳皮柏子仁煎湯各錢半誠服必通神第參拾二籤腹皮枳壳共鈎藤白朮元參薏苡仁各用一錢薑作引服之得效望回春誦佛五萬聲彌陀經四十八卷第參拾參籤海南沉香用八分開水磨沖配完成橘葉煎湯和服下病證難痊可止疼業冤甚重速宜懺悔解釋多念佛號第參拾肆籤製軍熟地各三錢白朮沙參貝母全若遇吐紅諸勞氣二錢一服可除根第參拾伍籤荷梗辛夷緑升麻每用三錢最可誇寄語求方諸善士此方服下即能瘥第參拾陸籤無底之舟用甚修木香一塊水東流同煎服下能消動此疾經年可望收速懺悔多生業障多放生靈第參拾柒籤白芷防風蒼耳草各用二錢同國老飴糖貝母各二錢證屬險候難全好拂除俗事默佛蒲團第參拾捌籤芝皮秦皮黑豆皮桑皮更用五加皮薑皮各用五錢半得愈之時方見奇每日發願持大悲呪二十一遍第參拾玖籤黨參三錢要細紋蘇葉二錢共合成煎服如薑汁和蜜虔誠捧服效如神第肆拾籤木瓜檳榔四分棗薑三箇完成臨服加入瓜酒能無冤業纏身佛號念四十八萬解劫呪一千二百遍放生命五千條第肆拾一籤彌陀為丸放生為引九九作成病離食傾第肆拾二籤爐內香灰一撮案前淨水一杯煎服須要誠敬此病難以全回多生罪業速宜念佛消除第肆拾參籤大香三根要三錢東流菩提水中連常喧佛號來煎服業障深沉豈偶然第肆拾肆籤乩盤砂子要三錢臨服香灰一撮煎加上菩提水煎服陰人休犯亦能痊第肆拾伍籤拜熱腐草用二錢七寸燈心十箇全煎湯服下須忌口管教患者笑連連第肆拾陸籤荷梗葉邊用三錢荷蒂相同七寸連生地麥冬二錢半寅時煎服病能痊第肆拾柒籤橘皮竹茹共丁香柿蒂如來惟最涼每用二錢水煎服照方三服病稱祥第肆拾捌籤四物湯加遠志仁佩蘭鱉甲牡犡粉各配二錢加肉桂照方服下莫勞神宜趺坐調出入氣罰籤方求方來意不誠藥餌如何通神罰出香油筋半道場供養佛燈明天正心誠意再求今日不發外證籤方外證凡來求方者先在佛前許願領佛圖一張念佛四十八萬少者四萬八千再次者四千八百聲將佛圖圈滿上寫代一切恩冤情識回向西方此圖在佛前焚化若果虔誠自有感應第一籤獨活共南星研末兩和勻𦵇頭調敷好腫毒見此靈第二籤甘石寒水石研末敷三日麻油調第參籤紅花與木瓜研末麝香加醋蜜調和好外證遇此瘥第肆籤蒼耳果要鮮搗敷病可痊第伍籤馬鞭鮮草葉患人腫上貼第陸籤千人腳下泥𦵇頭同搗勻患者敷一宿洗去病如擒第柒籤陳挂絡子香麻油共栽培第捌籤桃丹與石膏油敷病可撓每用三錢第玖籤黃連並黃柏研末二錢足水蜜調勻合同敷腫上肉第拾籤神前蠟燭油敷之病可瘥晝夜一換第拾一籤紫甘蔗皮燒灰存性油調勻可能却病第拾二籤黃連膏三錢敷之病可拈第拾參籤真君妙貼散三錢水蜜調第拾肆籤大楓肉五個麻油要一杯同煎兩三滾敷之病可回第拾伍籤梨皮二三片腫消可立見第拾陸籤死鯽魚麝香搗敷病可良第拾柒籤雞蛋水粉漿調敷保安康第拾捌籤蜈蚣焙成灰全蠍兩三枚研末水敷好腫消病可回第拾玖籤老松樹皮粗搗爛如泥敷第二拾籤豆腐一塊硫黃五分同煎數滾敷上功成第二拾一籤黃參一錢十日搽膏藥蓋之患可瘥第二拾二籤拜墊草燒灰麻油敷病回第二拾參籤望月砂三錢研末涼水調敷過取舊綢裹好第二拾肆籤線香十根研末涼水調敷腫毒第二拾伍籤鹽滷與炒米搗敷病立起第二拾陸籤麝香冰片研細末每用二分用手撮第二拾柒籤沖和散五錢𦵇蜜敷病痊第二拾捌籤上肉桂一錢研末用膏貼第拾二玖籤蔥艾各一兩煎湯薰洗好第參拾籤蛇床共苦參煎湯洗住疼第參拾一籤炮甲片二錢研末搽自全第參拾二籤血竭與木瓜二錢研末加瓜酒調敷好何患病不瘥第參拾參籤象皮具母末搽之可立奪第參拾肆籤松香與醋搗敷之病可好第參拾伍籤生大黃一兩研末敷腫上冷水調綢包好第參肆陸籤乳香共末藥搽之疤可落第參拾柒籤銀硃用二錢醋調敷自痊第參拾捌籤真硃共琥珀研末能去毒第參肆玖籤浮小麥三錢研末溫水敷放患處用皮紙蓋上綢札第肆拾籤蟾酥二錢研末菊花汁水調敷第肆拾一籤萬靈丹一副服之病可除第肆拾二籤琥珀丸七粒服之能愈疾第肆拾參籤牡糲研末瓜酒沖服第肆拾肆籤防風通聖丸三錢病可痊第肆拾伍籤嫩桑枝七個蔥頭放三根煎湯服三劑此病可除根第肆拾陸籤小粉漿二錢滴醋同調敷第肆拾柒籤冰片和死鯽魚腦搗敷如泥證可好第肆拾捌籤乩砂一撮香灰一兩醋蜜調敷效如影響罰籤求方要誠心不誠何能靈大香罰斤半蠟燭共一斤
