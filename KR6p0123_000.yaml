front:
  text: 蓮修起信録鸞說飛鸞開化其來已久機感靈應則示乎人神不能言假人言之假人手中之物言之神離乎人鸞不能運人離乎神鸞亦不能運也沙盤落字如飛光氣四射不可逼視人與物皆不得自主其非假託昭昭然也或問降鸞之神以神運鸞乎抑實有物運鸞乎殊不知天地間祇一氣充塞神之靈大則蟠天際地小僅入於芥子經云修羅王施神通力身量充透三十三天小能藏於藕絲中此釋迦文佛金口親言決非妄語三界善惡諸神福德有厚薄力量有大小判語有精粗大都勸善懲惡者為正惑世誣民者為邪善惡分則是非立判於鸞何疑淨雲菩薩敘程子纂蓮修起信録成乞敘於豫豫曰昔宣聖以六經救世其道雖大難救末流之弊我佛開慈悲方便法門四字真言普濟無邊上智之士念佛可以明心見性解脫生死中下之輩念佛向善不致起念作惡墮落三途我佛救世之心不論高下利鈍一體等觀普攝無遺豈非輔世翼教之一大法門哉嗚呼人心陷溺日深只賸此一句彌陀可救若此路一閉別無可以救度衆生之法我勸衆生彌陀當早念也念佛之法有三神念口念心念神念為上心念次之口念又次之念佛之人先要明心心明則佛在心佛在心則一刻不離果能一刻不離雖夢寐中亦有佛在至夢寐中亦有佛在神即游於佛土矣如軒轅之夢入華胥即神游淨土也生能如此何愁死不往生今人念佛口念雖多神念却少大都雜欲擾擾口念而心亂貌似而神非何得謂之念佛我觀衆生智慧德相誰不如如來生初無知渾然天理如此心性即是彌陀終身若此誰不可以往生誰不可以成佛經云一佛當心諸魔悉退生前無障命盡往生此理之常無足怪者奈何衆生私欲日蔽貪吝詐僞狡猾行凶作百端惡孽所以三塗不免必入輪回真可悲也此書諸佛菩薩顯示淨業功夫往生實驗如行路之有導如入暗之有燭爾等既知念佛之好切勿空過此生人身難得佛法難遇已得已遇此萬劫難逢機會也勉之慎之是為序敘嘗讀魯論至毋意毋必毋固毋我一章而歎意成於我我又生意物欲牽引循環不窮惟孔子盡絶根株隱有合於佛教之大旨曷言之昔覺明妙行菩薩云心行處有是衆生生死業心心本無念念逐想生此想虗妄流轉生死猶孔子所謂私意耳夫私意妄想迷戀俗情皆由誤認色身執定為我因之造種種業奉此形軀利己不顧損人養身致多害物豈知四大變壞三塗難免佛言衆生自無始來認賊為子自竊家寶奈何惑於塵勞而喪真性乎果能毋意毋我即色即空則心德渾全住世為聖人之施澤心光普照出世為諸佛之慈悲儒釋同此心源即同此之性體亦即同此功行也程公厭塵法派淨佛與先君子默契清修時或參稽楚貝清倦游歸里近仰慈暉以此兩世因緣幸遭逢上善知識蒙示道場中諸佛菩薩歷年降乩寶訓並往生諸上善降乩開化同侶偈言兼有淨公在道場中為大地衆生苦表文伏讀之餘如聆棒喝每慨人心日敝悉僞儒華士釀成之蓋農工商賈不言文無敢肆行排抵而聖學漸滅讀書者性理弗明於是尖頭鋭面之狂生訾戒殺戒淫為迂謬甚至敵讐三寶斥為異端大藏經云誹謗正法同於五逆十惡此等殘暴無明固佛界之波旬亦儒林之敗類也此則淨公因果淺說一篇所由集也以淨公夙根般若靜悟瞿曇被圓頓之機開方便之路所謂一時勸人以口百世勸人以書願力宏深訖於福利人天者信乎其不可說矣淨公於二十年前得悟和老人正傳淨土法門於是不惜勞苦開社勸人親對佛刺十指端血發四十八願繪彌陀地藏二聖像繕成內典共大小三十二部扎七級浮屠供奉焚化恆寫十年如此悲心廣大為過去父母師長贖罪超生益知淨公意我胥忘冤親普渡清真不可及不可及矣數十年來流蕩恆沙愧未繼先人之志得公指引恍見彌陀爰薰沐敬撰辨言冀天下後世見斯集者洗心滌慮廣發菩提是則我淨公之本願也夫時在光緒十四年歲次戊子清和月下旬同郡晚學生東亭陳沐清頓首謹序敘釋迦住世說法四十九年無量法門具詳龍藏惟淨土念佛一門為憫末世衆生力怯直指殊勝方便但能一心不亂即入圓頓正宗惟上智利根不難深信而說空禪客動輒生疑今值末法邪見日滋故諸佛菩薩憫衆生顛墜憑鸞開化喚醒癡迷起信一書真救世之慈航佛門之棒喝矣是書為厭塵居士所録存居士棲心淨域功行深純豫仰慕潛修進求指授因出是編見示額誦再三見其約事顯理即淺究深實能上契心源發人深省其為金口親宣毫無疑議或曰降乩顯化乃神道設教之事我佛寂滅為宗豈復作此狡獪豫曰豫言良是豫所以信者信其理也非泥其事也若徒拘執事迹目見為真我輩凡夫既未親眼見佛遂謂震旦流傳之三藏十二部經皆非佛說可乎故圓通之士惟理是信信理既堅則視此書為佛說也可即非佛說而視為佛說也亦無不可若因語出於乩因而非之吾不知其可矣因沐手而為之序光緒二十年歲在甲午仲冬二日淨業弟子張淨觀薰沐敬書敘兆鸞愚人也幼不知佛法因感乩語發心數十年精進少有所知不忍為敝帚之棄略述梗概置之篇首即以為敘豫籍海陵先君子於道光間先後應高郵州牧范魏兩刺史之聘因徙家居郵咸豐間寇擾江北州人倉皇遷避豫亦奉母居鄉間日與樵牧伍不知佛法也一夜夢身在曠野見緇素數十輩皆胡跪合掌念佛中一比丘來撲豫肩曰大劫將來汝尚不知念佛耶豫瞿然驚寤後詣張金門家看扶鸞一仙降云大劫未已吾奉帝命稽察甚忙豫頓觸夢中比丘言心怦怦動時私心揣測不識真僞思舉隱事問難乩忽稱豫乳名豫始惕然豫汝名張實不知也並判云汝深具夙根何不速斷塵勞歸心淨業豫拜謝此發心之始也是時賊氛遍地學使久不觀風豫決意棄儒學佛事悟和法師朝夕親炙解淨土法門惟豫由乩語勸悟嗣後月必兩次請乩凡語涉佛教者先後録存裒然成帙先是悟和長老建永清念佛社師圓寂豫承師命領衆乩改名為智慧道場並云爾淨因未熟耐心念佛此壇可支二十年也是年瘟疫流行醫多束手華大王判救世諸方乞者輒效豫因於念佛外兼事放生志益堅定又承乩命行空獄施丹濟苦消災諸懺每懺念佛七日並勉以若果念佛虔誠諸佛菩薩當來輔助一切判語具如後録夫修淨業者信願行三字最難切實平日功夫非死心踏地臨命終時何能一心不亂蓮池大師曰信願行三淨土資糧資糧既具準見慈王旨哉言乎修淨業人切勿朝更夕改見異思遷祇要提起一件功課由始至終一信做去信為功德母長養諸善根無論發何願直至未來際縱刀鋸在前身命可捨而我一念真誠無怨無怖無疑無悔終不退失此淨土方便法門名為橫出三界非比參禪持律為豎出三界一生不能了脫譬如三十三節竹子一根豎修者節節咬通方透至極頂橫修者如旁穿一孔從此鑽出極其捷速阿彌陀佛四十八願中云若有衆生稱我名字而不生我國者誓不成正覺行者若肯信心仗佛誓願畢此報身定超三界世間念佛者雖多大半希冀現前未來福報求其發願回向者百無一二如此念佛何年得見彌陀至於超拔先靈導歸極樂果其精誠上契自能感應道交世問以佛事為兒戲又多焚紙鏹冥具致死者執相生貪依舊沈迷五欲難脫輪回顛倒癡迷真堪痛惜余自椿萱棄養風木興悲罔極深恩不知所報後讀蓮池八祖書方知欲報親恩莫如念佛仗彌陀力薦先靈出苦往生是為大孝古人刺血寫經不可枚數兆鸞仰冀前修涕霖如雨因在三寶前稽首立誓陸續刺指瀝血書大乘經三十二部恆寫十年事畢之日造繒綵七級浮圖奉經供養延道侶念佛七晝夜然後焚化沉其灰於盂城之甓社珠湖為無始以來生生世世父母師長法界衆生懺除罪業仗此微忱同生安養乩判云血滴滴血滴滴映透西方七寶壁三乘七趣出娑婆仗爾功勳超淨域余今年六十有六矣𩯭髮如霜齒牙漸脫自知幻宅難於久居往昔淨因殆將具足平生相識半已墓草離離矣甲午秋淨業課畢挑鐙獨坐梧桐滴雨蟋蟀哀鳴嗟時序之如流歎人生之若夢奮筆書此垂示後來因搜羅篋中舊存鸞訓若干則又附拙著數條都為六卷名曰蓮修起信録節衣食餘資付之梨棗古人云一世勸人以口百世勸人以書倘龍天護法廣遠流通自能感發善芽信心無量此區區苦衷所禱祀而求者耳因作偈曰阿彌陀佛弘誓願度盡衆生無疲倦世人深信苦修持速證蓮操左券飛鸞開化具婆心斬惱除煩智慧劍過去現在及未來一切有情三界遍我今刺血寫金經供奉慈王乞垂鑒浮圖七級性中光彌陀一句心頭念同生極樂離苦輪滿我悲懷塵不戀衆生實信普回光莫再愚癡生妄見噫世間高人才子誹謗佛法以出世之說為愚豈知出世乃大丈夫第一見識楚石大師云萬億人中一二知是知愚者不愚彼說愚者適以自愚而猶不知為愚也悲夫光緒甲午年孟冬月六六老叟淨業弟子程兆鸞沐手謹述蓮修起信録目録卷首諸敘卷一寶訓上卷二寶訓下卷三籤方卷四往生徵信録上卷五往生徵信録下卷六厭塵雜著附
